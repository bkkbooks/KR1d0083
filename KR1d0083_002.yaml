body:
  text: 參讀禮志疑卷下婺源汪紱撰朱子文集卷七十四策試榜喻云問唐開元釋奠儀設先聖神位於堂西東向先師位其東北南向初不云有像設及從祀諸子也今以當時人文章所記著考之則皆爲夫子南面像門人亦像十二而圖其餘於壁是則開元之制施用於當時者亦無幾耳愚按一代之禮逐時增改不同古今皆然如明之會典其不施用者多矣何怪乎開元之釋奠儀哉今人或執一端以疑周禮者皆不通於時變者也周禮一書大段無可疑特人不善讀耳毁周禮者妄矣大夫士出入君門由闑右疏云門以向堂爲正右在東集說止云闑東爲右欠明古者門中樹闑而本國君臣出入皆由東扉特君由東扉之中士大夫皆稍西近闑耳門以向堂爲正故右在東以自外入言也其實自内出則由闑左也雲莊集說固稍欠明白然未失也乃饒氏陳氏之說則云入以東扉爲右出以西扉爲右君之出由東扉入由西扉皆在闑左大夫士則出由西扉入由東扉皆在闑右則謬誤尤甚矣抑知本國君臣出入皆止由東扉惟來朝聘之賓客則由西扉也由西扉則由闑左矣餕餘不祭集說有二解孔疏又是一解今姑從集說前一解餕餘不祭自是不行每食必祭之禮然以論語君賜食章通之則朱子所謂食恐或餕餘故不以薦之意雖父亦不以餕餘薦其子夫亦不以餕餘祭其妻也獻田宅者操書致孔疏云古者田宅悉爲官所賦本不屬民今得此田宅獻者是或有重勲爲君王所賜可爲己有故得有獻集說吕氏亦如此解然愚按既是君所賜豈得擅獻人燕噲之讓子之鄭伯之假許田君子皆譏之則此解豈可通乎竊恐是周衰之變禮下文前有車騎則載飛鴻疏亦云古人不騎馬今言騎者當是周末時禮古者田宅皆君有無自以獻人之理竊以上之賜下敬之則亦曰獻此或君以田宅與賢者則操書以致之而辭曰獻耳古不騎馬然房心之南有車騎騎官等星此豈甘氏石氏所造之名抑或車騎只猶言車馬歟知生者弔知死者傷鄭注云弔傷皆謂致命詞也孔疏云皆不自往而遣使致己之命也愚按此則分而言之曰弔曰傷故弔有弔詞傷有傷詞若通而言之亦曰弔而已矣集說殊欠分明知生者弔弔弔生者也知死者傷傷傷死者也若與死者不相知自無傷死之情弔其所知之生者而已與生者不相知自無弔生之情傷其所知之死者而已此自當然之情不必拘拘以致命之辭言父之讐弗與共戴天孔疏云公羊說復百世之讐古周禮說復讐之義不過五世許慎謂魯桓公爲齊襄公所殺其子莊公與齊桓公㑹春秋不譏又定公是魯桓公九世孫孔子相定公與齊㑹于夾谷是不復百世之讐也從周禮說鄭康成不駁即與許慎同愚按集說于此亦畧不言父之讐弗與共戴天須㸔事體何如公羊言復百世之讐孔疏言復讐之義不過五世皆非也執玉其有藉者則裼無藉者則襲鄭注載有兩說其前一說是正意集說反取其後一說恐未是裼襲二字孔疏于執玉條前則云凡執玉之時必有其藻以承于玉若盡飾見美之時必垂藻于兩端令垂向于下謂之有藉當時所執之人則去體上外服以見在内裼衣故云有藉者則裼也其事質充美之時承玉之藻不使下垂屈而在手謂之無藉當時所執之人則掩其上服襲蓋裼衣謂之無藉者則襲藻藉有二種一者以韋衣木畫之也二者絢組垂之若版之藻藉則常有今言無者據垂之也其垂藻之時則須襲後則云裼所以異于襲者凡衣近體有袍襗之屬其外有裘夏月則衣葛其上有裼衣裼衣上有襲衣襲衣上有常著之服則皮弁之屬也掩而不開則謂之爲襲若開此皮弁及中衣左袒出其裼衣謂之爲裼故鄭注聘禮云裼者左袒也據前所言則裼似去外服據後所言則裼只似袒存疑解鄉黨則又似有直領曲領之分未知果何如又按玉藻襲裘不入公門孔疏云裘上有裼衣裼衣之上有襲衣襲衣之上有正服但據露裼衣不露裼衣爲異耳愚按此只云露不言何様露法想或去而露之或袒而露之或直其領而露之其制原不一也執玉其有藉者則裼謂既聘而享主客裼以將事享用圭璧有皮幣之屬以藉之偕升於堂其執玉亦垂繅以將也其無藉者則襲謂初聘時主客襲以將事聘禮圭璋特逹以通信耳是無藉則襲也襲裼之分說者多異同孔疏言凡衣近體有袍襗之屬其外有裘夏月則葛其上有裼衣裼衣上有襲衣襲衣之上有常著之服則皮弁屬也掩而不開則謂之襲若開此皮弁及中衣左袒出其裼衣則謂之裼愚按左袒其外衣如釋氏之著偏衫此必無此禮况經每言襲裘裼裘未見有所謂襲衣裼衣者且襲裼皆以裘爲主若如所言左袒出其裼衣則是見其中之衣耳所謂見美充美者豈此裼衣之謂乎論語緇衣羔裘素衣麑裘黄衣狐裘誠以見美而欲衣裘之同色也若不見其美又何取於衣裘之同色乎近萬伯符亦覺其說之非因謂裼衣即皮弁之屬古冕弁朝服皆直領可見其裘故曰裼襲衣即深衣也深衣曲袷左右有衿加深衣於弁服之上則兩袷相掩不見其裘故曰襲此說似近之矣然愚按冕弁朝服皆禮服之正且尊者而深衣則達於庶人及乎燕私以朝聘重禮而反加下服於上又豈其宜且其言深衣而有加衿尤必非古制也深衣之辨此不及詳記曰長中繼掩尺中中衣也中衣長衣麻衣深衣皆同制冕服之中衣以絲諸侯則朱領黼緣所謂素衣朱襮也弁服則以布只曰中衣緣之以素則曰長衣緣仍以麻則曰麻衣麻衣則不加袂而袂短緣之以青黑及采色皆曰深衣深衣長衣中衣則繼其袂使長可反屈及肘故曰繼掩尺也而中衣加於裘外弁服之内故曰中中衣之領可交可開交使左右相掩開則左右不相掩以其可相掩故曰曲袷襲裼之分亦以中衣而别蓋交掩中衣之領又放其長尺之袂則裘色不見於外是襲而充美也開其中衣之領又捲其掩尺之袖則領袖間皆見裘色是裼而見美也若裼者則相易相合之義主於内外相稱而言之是故朝服而緇衣則羔裘與之稱皮弁服素衣則麑裘與之稱息民之祭黄衣則狐裘與之稱是裼衣即弁服之類何必别有裼衣乎又何必偏袒許多衣服而後見裼衣乎又何必加深衣於外而後謂之襲乎若古之冕弁朝服則固皆直袷也苞屨扱袵厭冠不及公門孔疏謂服問云唯公門有稅齊註云不杖齊衰也于公門有免齊衰則大功有免絰也如鄭之言五服入公門與否各有差降熊氏云父之喪惟扱上袵不入公門冠絰衰屨皆得入也杖齊衰則屨不得入不杖齊衰衰又不得入其大功絰又不得入其小功以下冠又不得入此厭冠者謂小功以下之冠故云不入公門凡喪冠皆厭大功以上厭冠宜得入公門也愚按集說云此皆凶服故不可以入公門並不言有差降則與所謂不奪人之喪者違矣鄭云五服入公門與否各有差降此條不可不詳扱上袵父母始死之儀故最厭屨重於衰衰重於絰絰又重於厭冠也孔疏曰案大行人云侯服歲一見甸服二歲一見男服三歲一見采服四歲一見衛服五歲一見要服六歲一見六服分來又每方服别分爲四分一分朝春一分宗夏一分覲秋一分遇冬愚按此朝覲之制與書蔡註所說羣后四朝六年五服一朝之制不同大行人侯甸男采衛要六服來見各有疏數此最近情理但與周官六年五服一朝之言不合顧周官或有更定不必盡同周禮又或周禮所謂見者雖使卿大夫來見亦可不必其君親來朝也鄭康成云朝者位于内朝而序進覲者位于廟門外而序入孔疏云此内朝即路門外朝也對臯門内三槐九棘之外朝故稱内也若對路寢庭朝又爲外又云凡天子三朝一在路門内謂之燕朝太僕掌之二是路門外之朝謂之治朝司士掌之其三是臯門之内庫門之外謂之外朝朝士掌之諸侯亦有此三朝愚按司士所掌治朝之位王南鄉三公北面東上孤東面西上卿大夫西面北上與曲禮所謂諸公東面諸侯西面者不同孔疏並不詳其何故天子當依而立諸侯北面而見天子曰覲天子當宁而立諸公東面諸侯西面曰朝依者路寢牖戸之間覲禮諸侯入路門北面見天子曰覲故曰覲禮天子不下堂而見諸侯惟路寢有堂有階法秋之嚴也宁者路門之外應門之内其間樹屏所謂天子外屏天子出路門宁立於屏外應門之内諸侯入應門而朝則諸公東面諸侯西面也出路門則已下堂矣鄭注云朝者位于内朝而序進孔疏曰此内朝即路門外朝正所謂治朝當宁而立者也但周禮司士掌治朝之位三公北面東上孤東面北上卿大夫西面此上與記不同者周禮所言畿内在朝之臣日朝于王之位與外諸侯來朝不同然其以西爲尊一也孤尊于卿朝禮受贄于朝受五等圭璧受享于廟受圭璧皮幣庭實之享覲禮一受之于廟然則所謂當依而立者亦是廟寢之依鄭云覲者位于廟門外而序入意廟門即廟之寢門蓋宗廟雖亦五門而不設三朝之位也既葬見天子曰類見孔疏云春秋除喪三年除喪之後乃見而今云既葬者謂天子或巡狩至境故得見天子未葬未正君臣故雖天子巡狩亦不見也愚按此疏甚明集說畧而不言何故既葬見天子曰類見蓋非當見天子之時而見亦類于朝見之禮猶非郊祀而有事於天曰類于上帝也問大夫之子長曰能御矣鄭注云御猶主也書曰越乃御事謂主事者此說不可易集說却云御御車也甚謬問大夫之子長曰能御矣鄭注御猶主也固勝於集說然集說亦不謬理王制鄭康成註云殷爵三等者公侯伯也異畿内謂之子周武王初定天下更立五等之爵増以子男而猶因殷之地以九州之界尚狹也周公攝政致太平斥大九州之界制禮成武王之意封王者之後爲公及有功之諸侯大者地方五百里其次侯四百里其次伯三百里其次子二百里其次男百里所因殷之諸侯亦以功黜陟之其不合者皆益之地爲百里焉是以周世有爵尊而國小爵卑而國大者唯天子畿内不増愚按如此說則周禮與王制方不矛盾而程朱之意則以爲是出于漢儒之附㑹不可盡信闕之可也今人讀書者不可不知康成之說又不可不知程朱之意康成謂周公致太平斥大九州之界方七千里乃大封五等諸侯殷之諸侯亦以功黜陟之其不合者皆益之爲百里此真紙上空談中國之地西盡流沙東距東海北盡朔漠南距南海不能方七千里且兗豫居中國之中其州境又將安擴周禮職方九州雖與禹貢爾雅有分合不同要其州境之山鎮川浸方位則未嘗有異未見有加擴也夫殷侯錯處各有故壤舊九州中安得許多閒地勢必搬移去二十五個百里之國然後可封一上國之公搬移去十六個百里之國然後可封一侯國搬移開九個百里之國而後可封一伯國搬移開四個百里之國而後可封一子國天下諸侯一動百動如何其可又何處尋地來皆益之使百里乎不然則所新封之國皆將在所擴邊境之地而不在中國乎然魯衛唐宋固未見皆居邊境也大概周禮雖云公之地方五百里侯之國方四百里然而新封大國不過齊魯宋衛陳蔡諸國約畧可數而當日皆謂之監且初封諒亦不甚大但許多小國皆受其節制云爾其後淮夷徐奄武庚管蔡霍皆畔而成王周公平之滅國者五十然後諸新封國皆得以益其封舊國多方當有罪而不滅其國者只使之爲附庸周公因爲之限曰方五百里方四百里以著之爲經亦其大畧而已九州之經界山川自若周公安得而擴之即曰擴之亦蠻夷鎮蕃之服寧得以廣分王者之後有功之臣哉凡四海之内九州州方千里九州千七百七十三國鄭云此殷制也周公制禮九州大界方七千里七七四十九方千里者四十有九也其一爲畿内餘四十八八州各有方千里者六孔疏云此殷制也者以夏時萬國則地餘三千里周又中國方七千里今大界三千非夏非周故云殷制也云周公制禮九州大界方七千里者案大行人邦畿方千里其外方五百里謂之侯服甸服男服采服衛服要服服五百里通王畿四面爲七千里大行人要服已外即云九州之外謂之蕃國是要服以内爲中國也愚按謂之殷制則周初武王之制亦如此矣大抵康成之意所以定此爲殷制者蓋以百里七十里五十里之國與周不同又千七百七十三國與禹萬國數復異然云禹承堯舜要服之内地方七千里是謂禹之地擴于唐虞也又云夏末既衰夷狄内侵諸侯相并土地減國數少殷湯承之更制中國方三千里之界亦分爲九州而建此千七百七十三國焉是謂殷之地狹于夏也又云周公復唐虞之舊域分其五服爲九其要服之内亦方七千里而因殷諸侯之數廣其土増其爵耳是謂周之地又擴于殷也此皆未見確據故程朱寧闕而不論而其解尚書弼成五服至于五千云輔五服而成之至于四方各五千里四面相距爲方萬里王肅蔡沈亦皆不用其說孔疏于王制雖從鄭而于尚書則仍主王肅弼成五服至于五千爲方萬里此鄭說尤謬海内之地何處討萬里得來若實考九州内壤則方五千里者殆猶未足也冀州已處北偏冀州以北曷能有二千五百里哉王制言九州州方千里西不盡流沙東不盡東海南不盡衡山北不盡恒山此九州内地大較而不盡二字意自圓活若盡流沙東海暨恒山以北衡山以南則五服合五千里亦其大較至于禹時萬國殷時千七百國則朱子所云初時只是聚族類各爲君長天子乃以法制定之到後來漸漸兼并得大了周有天下封其伯叔甥舅不得不大其封以統屬之然萬國千七百國者亦約畧言之非必實如其數亦非必定某州封分多少國也禹服與周服不同者曽氏以爲禹服是四面相去各五百里周服是兩邊合算共五百里是每面只二百五十里算此最近是蓋如此則周之王畿當禹甸服千里周之侯甸當禹侯服周之男采當禹綏服男當揆文教之地采當奮武衛之地周之衛蠻當禹要服衛當要服之夷蠻當要服之蔡周都在西而德化先被江漢故衛服猶列内地周之夷鎮當禹之荒服夷當荒服之蠻鎮當荒服之流周去夷爲逺故夷在蠻外周之蕃服即禹之外薄四海咸建五長故周禮大行人於衛服以外仍謂之要服蠻服當要服之外半則仍是要服也而九州之外謂之蕃國何嘗有禹地擴于虞殷地狹于夏周公又斥大九州而爲七千里萬里要服以内仍七千里之理乎王肅程朱蔡九峰之說審矣比年一小聘三年一大聘五年一朝鄭康成則云此時晉文霸時所制熊氏則云或以爲虞夏法或以爲殷法總因與周禮朝聘之期不合故多異義闕疑可也中庸朝聘以時似不應以此解若聘義云天子制諸侯比年小聘三年大聘則孔疏謂是諸侯自相聘是周公制禮之正法與王制所云又不同也中庸九經原不限是天子所行乃孔子畧言其事以告哀公正是侯國可行者耳故朱子引王制比年小聘三年大聘五年一朝以解朝聘以時只欲得以時二字明耳不必合周禮也時解以此九經之事爲即文武方策所布之政泥矣造乎禰孔疏引白虎通曰獨見禰何辭從卑不敢留尊者之命謂出辭别先從卑起最後至祖仍取遷主則行也若前至祖後至禰是留尊者之命故不敬也愚按此推說禮意委曲得情造乎禰疏引白虎通辭從卑不敢留尊者之命此義甚精小學在公宫南之左大學在郊鄭註云殷之制天子曰辟廱諸侯曰頖宫鄭不註是何代制集說引張子曰辟廱古無此名蓋始於周恐亦難據大司樂賈疏曰五帝學總名成均當代則各有别稱三代天子學總曰辟雍當代則各有異名辟廱之名自周以前所未見而靈臺爲文王之詩若如鄭賈之說三代天子之學總曰辟雍則文王時爲諸侯不當有辟雍矣孔疏云諸侯不掩羣者是畿内諸侯爲天子大夫故下曲禮云大夫不掩羣此皆是熊氏之說若皇氏以此爲夏殷禮下曲禮爲周禮義或然也愚按此等異同處集說皆畧而不言豈不疎乎凡禮家前後所言少有異同只看義理何如不必一一求合孔疏謂大夫三廟者天子諸侯之大夫皆同知者以此及祭法厯陳天子諸侯即云大夫更不别云諸侯之大夫故知與天子大夫同也卿即大夫總號其三公即與諸侯同愚按天子之卿大夫受地與侯伯同而廟制却與侯伯異又士一廟鄭注云謂諸侯之中士下士名曰官師者孔疏云既云諸侯之中士下士一廟則天子之中士下士皆二廟也必知皆二廟者以其總稱元士愚按既與諸侯之大夫同而中士下士又與諸侯之中士下士異此等皆可從但云天子七廟是周制則難從又王制不言天子畿内諸侯有卿蔡仲之命曰周公以爲卿士孔疏謂周禮都鄙建其長立其兩馬鄭皆云立卿兩人愚按此可以補王制之闕凡禮家所數天子諸侯大夫士其大夫士皆只據諸侯之大夫士言耳天子之大夫自比侯伯子男如三公八命視上公九命六卿六命視侯伯七命中下大夫四命視子男五命上士三命中士二命得視諸侯之卿大夫惟下士一命是天子之卿大夫其車服皆與侯伯子男同安得只立三廟反與諸侯之大夫同鄭說非也天子犆礿祫禘祫嘗祫烝諸侯礿犆禘一犆一祫嘗祫烝祫此條集說與鄭注不同集說謂有時祫有大祫王制所言乃是時祫鄭注則只是大祫並無所謂時祫集說謂祫嘗祫烝與嘗祫烝祫變文而已非有異也鄭註則云天子先祫而後時祭諸侯先時祭而後祫又王肅以禘爲大祫爲小康成則以祫爲大禘爲小謂禘則太王王季以上遷主祭于后稷之廟其坐位乃與祫相似其文武以下若穆之遷主祭于文王之廟文王東面穆主皆北面無昭主若昭之遷主祭于武王之廟武王東面其昭主皆南面無穆主又康成之說又有練時之禘此等康成說皆不可從至杜預謂祫即禘也尤謬若康成謂魯禮三年喪畢而祫于太祖明年春禘于羣廟自爾之後五年而再殷祭一祫一禘其意以禘祫之年皆從三年喪畢後數起此似近理春祠者祭告之而已夏禴者禴亦薄祭也如易言利用禴不如西鄰之禴祭皆言薄也春夏物未成也以物薄故犆祭又或犆或祫秋嘗物始成嘗之也冬烝物備成而盛進也以物既成而厚故皆可祫而祠禴祭小則鮮見于經烝嘗禮大則毎見於經詩毎言烝嘗而祠禴則惟一見於天保書亦見有烝祭歲春秋則只書有烝嘗不見書祠禴惟周禮乃備言祠春禴夏嘗秋烝冬周禮一書漢初未出及既出而藏之祕府儒者皆未得見故漢初儒者鮮識祠禴之名而禘又大祭多見於經論語言禘春秋書禘禘祭亦行於夏月故王制以禘爲時祭之一而曰春礿夏禘秋嘗冬烝又子思之中庸以禘嘗並言故漢儒知禘嘗之義之大祭義郊特牲則因以禘嘗對言而曰春禘秋嘗蓋作王制者未及與作郊特牲祭義者參㑹以故爲說不同康成以春禘爲當作春礿亦遷就以圓其說耳然於食嘗無樂則亦終無可據矣大傳曰禮不王不禘此語立義甚嚴王者禘其祖之所自出而以其祖配之趙伯循曰王者既立始祖之廟又推始祖所自出之帝祀之於始祖之廟而以始祖配之明白甚矣周禮不見有禘祫之名然祠禴嘗烝之上有肆獻祼饋食二條司尊彞有四時之間祭追享朝享是肆獻祼追享即禘也肆只是四字王與后各四獻而初獻再獻則灌酒於地禘禮尊嚴重祼獻而不重饋食故以肆獻祼爲言也追享者追祭太祖之所自出而以太祖配之故曰追享也鄭氏以正月之郊祭本生之天帝謂靈威仰之類因惑於緯書固不可從而其解肆獻祼則時祭亦然經文複矣饋食朝享即大祫也祫祭太祖以下并及毁廟之主若皆四獻灌則太煩矣蓋祫主親親重合食而不重祼獻故以饋食爲言也朝享者羣毁廟之主皆朝于太祖之廟而享之也非時祭而間於時祭之間故曰四時之間祭也諦以夏四月祫以秋九月三代皆起自侯國别子爲祖而諸侯不敢祖天子及奮爲天子則得以祖天子又不可舍契稷而更祖帝嚳故五年而一追享之祖帝嚳於契稷之廟以紹其統此則禘祭之所由起歟若魯而禘文王於周公之廟則以諸侯而祖天子非禮矣又康成云魯禘三年喪畢而祫於太祖明年春禘于羣廟自爾之後五年而再殷祭稼書先生云鄭以禘祫之年皆自三年喪畢數起此似近理然曰春曰羣廟則終爲謬誤康成又有練時之禘蓋殷練而祔祔祭其主東面新死之主南面祔之是有似於追享故或亦以爲禘祔必以其昭穆故有禘視昭穆之說杜預謂祫即禘則又誤矣既曰禘曰追享則當專其誠必不及羣祧之主也關譏而不征孔疏謂此夏殷法周則有門關之征若凶年則無稅也愚按孟子所說大抵不純是周制周禮門關市皆有征而孟子言關市譏而不征夫商賈一概無征則民皆便於逐末矣然以周禮玩之則司布所征有絘布列肆之稅總布無肆而立地之稅廛布商賈所居屋稅是皆孟子所謂廛也其質布所罰在市犯禁者之錢罰布所罰買賣不平者之錢是則孟子所謂法也五布不必皆出錢即征其所有之貨以當廛稅若既取廛稅則不征其貨矣是廛而不征也凶札則市無征然質布罰布自不可弛是法而不廛也司關聨門市與司市官聨故亦曰掌其征廛蓋征廛於市則不復征貨於關征貨於關則不復征廛於市其或出於關而不由市者則關征之或近地入市而不由關者則市賦其廛皆只一征無再征也戰國時蓋有廛又有征征於市又征於關又有夫征里布則重征不已故孟子屢言之孟子固未嘗與周禮異矣孔疏引鄭考靈耀註曰日有九道黄道一青道一出黄道東赤道二出黄道南白道二出黄道西黑道二出黄道北日春東從青道夏南從赤道秋西從白道冬北從黑道立春星辰西遊日則東遊春分星辰西遊之極日東遊之極日與星辰相去三萬里夏則星辰北遊日則南遊夏至星辰北遊之極日南遊之極日與星辰相去三萬里以此推之秋冬可知又云月行九道並與日同愚按此言日之九道本因四遊而然今法既不用四遊則日恐難以九道言謂月行九道已不親切謂地與星辰四遊日行九道更無據鄭注月令謂凡此車馬衣服皆所取于殷時而有變焉非周制也周禮朝祀戎獵車服各以其事不以四時爲異又玉藻曰天子龍衮以祭𤣥端而朝日皮弁以日視朝于此皆殊疏云虞夏之制有日月星辰十二章之服周之制朝祀戎獵車服各有殊今此下與周禮不同上與虞夏又異故云取殷時也殷時木輅此乘鸞輅不純用殷故云而有變焉愚按以月令車馬衣服爲殷制此亦說得有據集說畧而不言何故月令只是先秦之儒所著以將爲秦法之書鄭注謂其取於殷時而有變焉只是曲說孔疏云賈馬蔡邕皆謂迎春祭太皥及勾芒鄭則以爲蒼帝靈威仰愚按依宗伯注則鄭說四時迎氣亦兼祭五人帝五人神四時迎氣自當祭天神而配以古帝倘所謂靈威仰之類歟天氣下降孔疏云天地之氣謂之隂陽一年之中或升或降故聖人作象各分爲六爻以象十二月愚按此云六爻象十二月精矣但月令于正月而曰天氣下降地氣上騰於十月而曰地氣下降天氣上騰方其升而謂之下降方其降而謂之上騰畢竟可疑孔疏亦未甚明白天氣下降地氣上騰只是交不交之象不必撦易卦六爻來說只看春天自似日低地之膏澤烝上秋冬之天自似日髙地氣亦不潮溼鄭注于仲夏大雩帝云春秋傳曰龍見而雩雩之正當以四月凡周之秋三月之中而旱亦修雩禮以求雨因著正雩此月失之矣又于季夏命漁師伐蛟取鼉登龜取黿註云四者甲類秋乃堅成周禮曰秋獻龜魚又曰凡取龜用秋時是夏之秋也作月令者以爲此秋據周之時也周之八月夏之六月因書于此似誤也愚按此鄭注仔細處集說皆畧而不言解月令自不必一一與周禮對合鄭注黼黻文章云白與黑謂之黼黑與青謂之黻青與赤謂之文赤與白謂之章與虞書黼黻之註絶不同使繅以爲黼黻文章自合依考工記所言釋之不必如斧形背已之黹繡玩孔疏中央土毎時輒寄一十八日其說本起于日之四遊四遊之說既不可從則寄旺之說恐亦難信中央土自以五氣論之當附於季月不必關日四遊之說律中黄鍾之宫孔疏云四時之律皆取應氣而土王之律獨取聲應者一者欲與四行爲互二者爲無别候土氣之管故也土無候氣之管者以寄王四季之末故從四時之管而不别候也唯以四行末十八日爲土之氣也蔡氏及熊氏以爲黄鍾之宫謂黄鍾少宫也半黄鍾九寸之數管長四寸五分六月用爲候氣按六月林鐘之律長六寸七月夷則長五寸三分有餘何以四寸五分之律於六月候之乎又土聲最濁何得以黄鍾半聲相應乎蔡熊之說非也愚按此處終屬可疑四寸五分之管既不可候六月之氣九寸之管之聲何以應于六月乎十二律只應得十二月決無十三律可以應中央土但以宫音屬土而黄鍾又爲律本土以成五行而於時無不主十二律皆以黄鍾取正故配言之耳此條孔疏甚明若黄鍾半律則不惟不能應氣亦并不可以起宫蔡氏熊氏說皆誤也顧月令此語亦自多事後世有别求三寸九分之管爲黄鍾之宫者皆自此語啟之文王之爲世子也教世子周公踐阼此三句注疏皆作結上文語集說皆作衍文當從註疏集說又云周公踐阼句缺一相字遂啟明堂位周公踐天子位之說愚按大全嚴陵方氏曰成王主也故於阼曰涖周公相之而已故于阼曰踐此輕重之别也如此說雖缺相字亦自無弊文王之爲世子也教世子周公踐阼三句是古人記注簡冊分段語耳文王世子言公族内朝以齒外朝以官其在宗廟之中則如外朝之位愚按如此則中庸序爵今講家以爲專是異姓者誤矣公族於外朝以官其在宗廟之中亦如之宗廟之中本朝之子孫無官爵者則序昭穆於阼階下有爵之同姓自以爵序孔疏謂鄭注云腥其俎謂豚解而腥之者按士喪禮小斂之奠載牲體兩髀兩肩兩胉并脊凡七體也士虞禮主人不視豚解註云豚解解前後脛脊脅而已是豚解七體也按特牲少牢以薦熟爲始之時皆體解無豚解以無朝踐薦腥故也其天子諸侯既有朝踐薦腥故知腥其俎之時豚解云熟其殽謂體解而爓之者體解則特牲少牢所升於俎以進神者是也按特牲九體肩一臂二臑三肫四胳五正脊六横脊七長脅八短脅九少牢則十一體加以脡脊代脅爲十一體也是分豚爲體解此熟其殽謂體解訖以湯爓之不全熟次于腥而薦之堂愚按此解熟其殽雖引特牲少牢然周禮籩人疏云天子諸侯大夫士雖同名饋食仍有少别何者天子諸侯尸食前仍有饋獻二是饋熟隂厭隂厭后尸入室食乃獻大夫士則饋熟與黍稷爲隂厭隂厭前無饋獻以此爲異耳又司几筵注曰祼于室饋食于堂繹于祊疏云饋食于堂謂饋獻節據有熟故言饋食其食未有黍稷集說不分别朝踐饋食又不分别大夫士欠明澄酒在下孔疏言鄭意澄爲沈齊酒爲三酒與集說不同熟其殽是獻爓饋獻于堂未有黍稷及隂厭後迎尸入室乃饋食有黍稷其殽亦全熟大夫士則只有室中饋食律吕上生下生先儒之說不同何椒邱曰黄鍾下生林鍾林鍾上生太簇太簇下生南吕南吕上生姑洗姑洗下生應鍾應鍾上生蕤賓蕤賓重上生大吕大吕下生夷則夷則上生夾鍾夾鍾下生無射無射上生仲吕此京馬鄭蔡諸儒及杜佑通典所說也然班固漢書所載律吕相生皆一上一下而京房等乃自蕤賓重上生大吕以後咸易漢志上下之號何哉蓋一上一下者相生之道也言重上生者吹候之用也論隂陽相生之正則當從班氏之說若必施之吹候之用則當從京馬鄭蔡之說二者並行而不悖焉愚按今集說所用亦京馬鄭蔡之說也律吕皆隂陽相生之正亦皆爲吹候之用而京房及杜佑皆自蕤賓上生大吕與馬班之書志不同抑知吕居其衝律守本位吕在東方則倍之吕在西方則如其本數其長短則京班不異也蕤賓可上生大吕亦有時當下生大吕仲吕上生變黄鍾實則仲吕只可下生變半黄鍾還宫之用不專如京杜也必細考蔡西山之律吕新書而又博參之諸家之說親審之琴瑟簫管之用然後律吕可言不然則紙上浮談耳其有當者鮮矣王前巫而後史卜筮瞽侑皆在左右集說石梁王氏曰巫祭祀方用卜筮有事方問謂常在左右非也大全西山真氏曰巫掌祀以鬼神之事告王史掌書以三皇五帝之事告王掌卜筮者以吉凶諫王瞽蒙之瞍以歌詩諫王一人之身而左右前後挾而維之雖欲斯須自放得乎愚按此一條當從真氏又禮必本于太乙孔疏云太乙者謂天地未分混沌之元氣也集說石梁王氏曰禮家見易有太極字翻出一个太一仍是諸子語真氏讀書記云太一者即太極之異名愚按此一條亦當從真氏王前巫而後史卜筮瞽侑皆在左右王中心無爲也以守至正此數語惟心無爲三字不善看則有病善看却亦不妨若巫史卜筮瞽侑之在左右則爲益多矣禮必本於太一孔疏以天地未分混沌元氣言則亦微有病若只以至一之理言則亦無病石梁王氏是先横一禮記不醇之心者禮也者合乎天時一條孔疏曰前云忠信爲本易見而義理爲文難覩故此以下廣說義理爲文之本集說無此明白又按舉其定國之數以爲禮之大經孔疏云禮物必鄉之所有故有國者必書其國内所生物多少定數以爲國之大法集說於此亦殊混禮器說義理之文處多猶中庸說中節之和處多禮之以多爲貴者以其外心者也禮之以少爲貴者以其内心者也此分而言之也若合而言之則以少爲貴亦是心之盡於外處内心外心原是一時俱有禮器篇大㫖重一稱字稱即時中之謂也文有不當多處多文則忠信之心反薄故宜謹其獨文有不可少處少文則無以達其忠信之心於外故又樂其發要以惟其時中而已内心是存此心於内外心是達此心於外非内心外心一時俱有之說禮有擯詔樂有相步温之至也鄭注解溫爲溫藉孔疏皇氏云溫謂承藉凡玉以物蘊裏承藉君子亦以威儀擯相自承藉愚按今人喜用蘊藉二字蓋本此即易不可以苟合之意又上文三月繫七日戒三日宿慎之至也鄭注云將有祭祀之事必先敬慎如此不敢切也孔疏云禮須積漸不敢切迫也按注疏解慎字俱用溫藉之義蓋經文慎與温本交互言之温之至也温字只如字讀如緩火之燖温煖以漸而不迫也不必轉聲作蘊内則柔色以溫之亦然魚膾芥醬芥醬二字注疏集說俱無解芥醬以芥子爲醬今人猶有之自蝸醢至卵鹽二十六物大全長樂劉氏曰士庶不可得而備之也偶其有者則如此法以制之凡爲人子婦者預當知之以敬于祭祀則鬼神享之以奉于燕飲則賓客樂之以饌于尊親則衰病宜之愚按如此說方見内則之喫𦂳爲人處凡醢醬之與膾殽配言者皆是以其物濡醢而食之如魚膾芥醬配設則以魚膾濡芥醬而食之桃諸梅諸卵鹽配設則以桃梅蘸卵鹽而食之故論語曰不得其醬不食也却不徒教人如法以制之而已接以太牢王肅杜預並以爲接待夫人以太牢鄭注云接讀爲捷捷勝也謂食其母使補虚强氣也集說則云以太牢之禮接見其子恐當從鄭說接以太牢接字只是接待不必如鄭氏讀作捷王肅以爲接待夫人雲莊以爲接見其子按此禮本是特重太子則陳說爲長然子非能食仍是接待夫人而已以接夫人以重太子之故而重夫人也補虚强氣之說淺矣玉藻疏云漢明帝時用曹褒之說皆用白旒珠與古異也愚按此則玉藻之制自東漢而變𤣥端而朝日注疏皆謂端當爲冕集說亦從之大全方氏則云𤣥端者祭服燕服之總名衣𤣥衣而加𤣥冕則爲祭服衣𤣥衣而加𤣥冠則爲燕服此與注疏集說俱不同𤣥端與𤣥冕不同凡朝祭之服皆袲袂四尺四寸端服不袲袂二尺二寸袂幅如布之幅故曰端士無朝服士之朝服即𤣥端大夫以上則不然矣方氏謂𤣥端爲祭服燕服之總名非也康成主明堂五室之說而謂九室三十六戸七十二牖是秦相吕不韋作春秋時說者所益非古制也此與朱子意不同又按康成解月令亦只是主五室之說其意蓋以九室乃後儒誤解不韋月令也集說于月令玉藻殊欠明白閏月則闔門左扉立於其中鄭注云聽其朔于明堂門中還處路寢門終月孔疏云於文王在門謂之閏是閏月聽朔于明堂門反居路寢門皇氏云明堂有四門則路寢亦有四門閏月各居其時當方之門義或然也愚按此因路寢如明堂之說而遂謂路寢亦四門益難信明堂之制據月令所云則當如九室之說故朱子亦取之若路寢之制亦如此則必不然路寢只是嚮南且五門而後及路寢安得有四面八方皆開門也月令所云居當亦只是聽朔時居其門位耳非終月居此也康成主明堂五室之說而云聽其朔于門中閏月則闔門左扉立于中還處路寢門終月皇氏云路寢亦有四門夫路寢則安得有四門哉若五寢則路寢之後爲四小寢此退息宴安之所僖公薨於小寢君子少之豈天子可毎一時居一小寢哉愚謂南郊明堂自當如九室三十六戸七十二牖之制亦制器尚象之㫖若太廟路寢則必不與明堂同制動則左史書之言則右史書之孔疏以周禮之五史參攷之知其即太史内史最見精細集說則不問其爲何官矣陸翼王集說補正亦備載孔疏之說左史太史右史内史孔疏此說是朝服以日視朝于内朝鄭注云朝服冠𤣥端素裳也孔疏云按王制周人𤣥衣而養老註云𤣥衣素裳天子之燕服爲諸侯之朝服彼注云𤣥衣則此𤣥端也若以素爲裳則是朝服此朝服素裳皆得謂之𤣥端故論語云端章甫註云端𤣥端諸侯朝服若上士以𤣥爲裳中士以黄爲裳下士以雜色爲裳天子諸侯以朱爲裳則皆謂之𤣥端不得名爲朝服也又朝𤣥端夕深衣疏曰大夫士視私朝故服𤣥端若朝君之時則朝服也朝服其衣與𤣥無異但其裳以素耳愚按此分朝服與𤣥端最明但朝禮則君臣同服若宗廟之事則君不服𤣥端亦不服朝服故論語蒙引謂君臣同服者非告朔聽朔之制内朝外朝之别此處孔疏說得最明天子諸侯之𤣥端朱裳大夫之𤣥端素裳天子諸侯爲燕服大夫爲居私朝之服士無朝服𤣥端即士之朝服上士𤣥裳中士黄裳下士雜裳𤣥端不袲袖若齋服之𤣥端則上下同皆𤣥裳麛裘青豻褎絞衣以裼之鄭注既云絞蒼黄之色又引論語素衣麛裘孔疏引皇氏云素衣爲正記者亂言絞耳集說絶不分别殊畧君衣狐白裘錦衣以裼之謂冕服也大夫狐青裘𤣥綃衣以裼之謂𤣥冕也麛裘青豻褎絞衣以裼之皮弁服也絞皎也言白色也鄭注云蒼黄之色謬耳蒼黄之色當作䋂若羔裘緇衣則朝服狐裘黄衣則息民之祭之服也孔疏謂王肅以家語之文武王崩成王年十三鄭康成用衛宏之說武王崩時成王年十歲與王肅異也愚按此等處總難稽考又書孔傳亦云武王崩成王年十三武王壽九十三而成王年只十三或曰只十歲豈武王年八十餘始生子歟成王邑姜出也邑姜太公女也武王年八十餘則邑姜年雖甚小亦宜六十餘矣豈婦人六十餘而始生子歟且猶有小弱弟也由此言之則成王年必不止十三不則武王壽不及九十三也要之新王諒闇不言冢宰攝政此禮之常惟周公多才多藝德望盛隆故反來武庚之煽以啟管蔡之疑耳其稱曰孺子曰孺子王則家人親暱之辭猶武王呼康叔曰小子也今陜西人以父兄呼子弟雖年四十五十猶曰小子其曰小子同未在位曰弗克經厯則恐王德未成忠愛之深顧慮之切也其自言惟予幼沖人則自謙之辭殷盤庚亦自言沖人也盤庚繼其兄陽甲而立則年必非幼矣成王豈不能涖阼而待於七年之後方始親政者然則文王世子一篇不獨九齡夢錫之誣及周公踐阼之語即此成王幼不能涖阼之語已貽後世無窮之惑矣獨其教世子及庶子官職之詳則有不可廢者擇之焉可耳少儀云不疑在躬鄭注謂不服行所不知使身疑也較集說似明毋身質言語及曲禮疑事毋質即此意不疑在躬與不度民械對則宜淺看事君者量而後入不入而後量集說就出處言鄭注謂量量其事意合成否是就逐事言愚按似當兼用量而後入不入而後量是出處大節學記術有序鄭注云術當作遂孔疏解之甚詳集說謂當作州者非術有序術字遂州二義皆可通術遂以聲近而轉審端徑術術字亦讀作遂術州則以文似而誤也篆文術州故其文似也宜並存之中年考校一條大全臨川呉氏講得最明愚按論語洒掃應對進退是小學之行學記離經辨志敬業樂羣博習親師論學取友是小學之知又離經幾句俱在則以學文中孔疏謂應入大學者自國家考校之其未入大學者鄉遂大夫考校也不見分大學小學似與臨川呉氏之說不同集說則並不言何人考校何處考校尤混至近來講家有所謂說約者則又云入學比校俱指大學言與呉氏之說全背離經辨志等事宜是小學多其訊言及于數集說云多發問辭以訊問學者而所言又不止一端孔疏云多其訊者訊問難也既自不曉義理而外不肯黙然故假作問難若己解之也言及于數者數謂法象既不解義理若有所言而輒詐稱有法象也猶若一則稱配太一二則稱配二儀但本義不然浪爲配當此解勝集說多其訊言及於數進而不顧其安使人不由其誠教人不盡其材是一串語言教人者量材授業嚴立之課而寛其程則人安之而得優游以盡心有得若只督以口誦之功而又多爲責問之言以及夫驟迫之進而不顧其能習熟與否則學者必只是口頭强記隨便苟且以塞責而不復優游涵泳以自求心得至於黙識心融矣是使之苟且而不自盡其誠教之以鹵莽滅裂而不能盡其材也愚此意畧本張子多其訊言一句及於數進而不顧其安九字作一句雖終其業其去之必速鄭注謂學不心解則忘之易此解得最明集說以工夫間斷言之亦非學非心得未有不速去之者或苦而棄之或淺而忘之皆是也此正誦讀時未嘗由誠未嘗盡材而徒以口頭强記之病相觀而善之謂摩鄭注云不並問則教者思專也孔疏云善猶解也受學之法若人人競問則師思不專故令弟子共推長者能者一人諮問餘小不能者但觀聽長者之問答而各得知解此朋友琢磨之益故謂之磨也愚按集說大全俱不用此解然此解自精論語孔門七十子親承問答者極少想亦由此師汲汲於取善則人皆相觀而善矣注疏謂或失則多謂才識淺小而所學貪多終無所成者或失則寡是才識深大而所學務寡終成狹局者或失則易是汎濫外問學而不思則罔者或失則止是不肯諮問思而不學則殆者此解亦勝集說或失則多務博之病或失則寡徑約之病或失則易粗心之病或失則止畏難之病此智愚賢不肖之過不及也天地之情也疏引皇氏云天地無情以人心謂之耳愚按西山讀書記論天地無心有心最詳恐不可一槩說記明言天地之情如何說天地無情昔者舜作五絃之琴以歌南風鄭注云其辭未聞孔疏云聖證論引尸子及家語難鄭云昔者舜彈五絃之琴其辭曰南風之薰兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮鄭云其辭未聞失其義也馬昭云家語王肅所増加非鄭所見又尸子雜說不可取證聖經故言未聞也愚按鄭氏不取雜說證經可謂謹嚴王肅駁之非也黄氏日抄亦載南風之辭失鄭氏之意南風之詩殊不似舜時詩然以爲南風之詩亦無大失䕫制樂非專以賞諸侯記亦謂以樂賞諸侯自䕫始耳其治民勞者其舞行綴逺其治民逸者其舞行綴短鄭注云民勞則德薄酇相去逺舞人少也民逸則德盛酇相去近舞人多也孔疏云綴謂酇也酇謂酇聚舞人行位之處立表酇以識之黄氏日抄亦主此解集說乃以行綴逺爲德隆樂盛行綴短爲德薄樂殺與注疏相反似宜從注疏治民勞治民逸陳氏謂勞於治民逸於治民也鄭氏則謂其民勞其民逸也愚從陳說大章章之也咸池備矣孔疏云黄帝所作咸池之樂至堯更増改修治而用之黄帝之樂堯不増修者則别立其名則此大章是也咸池至周謂之大咸大章至周謂之大卷更加以雲門之號雲門大卷一也愚按此皆是據周禮以解禮記集說皆不暇及自韶以上其樂俱難的考謂堯因黄帝所作之咸池更増改修治而用之其不増修者則别名大章是堯在位百年地平天成而不自作樂也大章又名大卷雲門亦無可証據廣則容姦狹則思欲注疏以樂言集說以人之感于樂者言恐當從注疏廣則容姦逖成滌濫而容姦律之聲則不和也姦律者非其本鈞所當用之律狹則思欲煩聲促節而起淫欲之思則不淡也所謂嘈嘈切切如私語者皆以樂言情深而文明氣盛而化神和順積中而英華發外孔疏及大全嚴陵方氏皆主樂言集說獨將氣盛化神句主天地言集說誤情深則文明矣氣盛則化神矣化神言樂感人之妙也陳註非君子於是語于是道古言古樂之妙君子聽之不覺其闡明而率循之故非此不語非此不道豈有厭倦之理蓋所以破文侯恐卧之言也集說不明白于是語因樂而論其詩歌動容之理于是道古因樂而道及古人之德行事業又因以得其理法其事則以之修身及家平均天下集說云三綱謂君爲臣綱父爲子綱夫爲妻綱六紀謂諸父有善諸舅有義族人有敘昆弟有親師長有尊朋友有舊此本孔疏又本禮緯含文嘉蓋緯雖不可盡信然聖賢精意亦時有藉之以傳如此之類者故康成往往以緯證經未可以此詆康成也紀綱不必分定六紀如疏說樂記一則曰禮勝則離樂勝則流是禮樂皆不可過也一則曰禮主其減樂主其盈是禮則懼其不足樂則懼其有餘也二條互相發明集說劉氏以謙卑退讓爲減以減而不進爲禮勝則離此另是一解與孔疏及馬氏注俱不同不可從禮勝則離即禮減而不進則消樂勝則流即樂盈而不反則放禮減而進嚴肅中自有從容不迫之意若一味拘迫則不成文矣樂盈而反和樂中自有中正和淡之節若一味流蕩則不成文矣孔馬劉諸說都未明白審一以定和集說應氏劉氏兩條不同劉氏與鄭孔注疏同應氏所謂一者心也恐不免有良知家之弊審一定和是審其詩之志意與聲音而定其所合之律應氏之說非是歌者直已而陳德者也直即直養無害之直直已者正直已身自反無愧正所謂得於未歌之前實有此德恐其雖得而復失故將諸詩敷陳以涵養保全之觀下文云有勇有義非歌孰能保此其意可見集說方氏一條以各濟所偏爲解非經意也注疏皆不如此解直已而陳德直如敬以直内之直陳者布列有序之意經解第一條言六經之教所得有淺深因而不能無失其義甚精集說石梁王氏謂此決非孔子之言殊誤經解首節未必全是孔子之言然其言要自無病後世以詩書而失之愚誣者正多矣與仁同功其仁未可知也與仁同過然後其仁可知也孔疏云過謂利之與害若遭遇利害之事其行仁之情則可知也愚按孔疏解此過字最明蓋與論語觀過知仁之意自不同集說吕氏及大全嚴陵方氏以論語之意解此誤矣與仁同過然後其仁可知語自有病且以過與功對則過非遭遇利害之謂孔疏多爲回䕶耳凱以强教之弟以說安之孔疏云凱樂也言君子初以仁政化下使人樂仰自强不息是凱以强教之黄氏日抄引吕氏曰凱樂也此以爲强教者和樂之中又有强盛之狀凱風長養之風也凱樂戰勝之樂也八凱性和而有才者也皆有强盛意此皆可與集說相發明凱以强教之弟以說安之二語甚深凱樂也强如自强不息之强性情和樂之至而無拂戾之私則萬物一體自誨人不捲教思無窮矣弟易也如易簡之易心體平易之至而無險陂之念則中國一人自愛無不至而容保民無疆矣强盛戰勝之解皆淺求也事君逺而諫則讇也孔疏云若與君疏逺强欲諫諍則是諂佞之人望欲自達也愚按此意甚正石梁王氏謂此非孔子之言過矣又孔疏云凡諫者若常諫之時天子諍臣七人諸侯五人大夫三人唯大臣得諫若歲初則貴賤皆得諫也故襄十四年左傳師曠對晉侯云自王以下各有父兄子弟以補察其政史爲書瞽爲詩工誦箴諫大夫規誨士傳言庶人謗商旅于市百工獻藝國語又云天子聽政公卿至于列士獻詩瞽獻典史獻書師箴瞍賦矇誦百工諫庶人傳語近臣盡規此皆孟春之月上下皆諫故傳引夏書曰毎歲孟春遒人以木鐸徇于路是也愚按此又可見逺臣之諫當有時候諫君不可不自量逺近如位卑而言髙罪也之類是也然有身雖逺而不能忘諫者如屈原之類不可概以讇譏之也石梁王氏疑非孔子之言不爲過矣緇衣言甫刑苗民孔疏曰鄭注吕刑云苗民謂九黎之君也九黎之君於少昊氏衰而棄善道上效蚩尤重刑必變九黎言苗民者有苗九黎之後顓頊代少昊誅九黎分流其子孫爲居于四裔者三苗至髙辛之衰又復九黎之君惡堯興又誅之堯末又在朝舜時又竄之後王深惡此族三生凶惡故著其氏而謂之民以此言之鄭以九黎爲苗民先祖但上學蚩尤之惡非蚩尤子孫孔注尚書以爲九黎即蚩尤也三苗則非九黎之子孫與鄭異愚按此敘三苗之始末最詳九黎三苗俱在南方亦不同種類今廣東沿海及瓊州皆有生黎熟黎堯舜時三苗在洞庭彭蠡之間今則雲貴川湖之境猶多苖民蚩尤則在北黄帝伐蚩尤於涿鹿即今順天之涿州鄭孔皆是勉强附㑹深衣續袵鉤邊鄭注云續猶屬也袵在裳旁者也屬連之不殊裳前後也鉤邊若今曲裾也孔疏云袵當旁者凡深衣之裳十二幅皆寛頭在下狹頭在上皆似下要之袵是前後左右皆有袵也今云袵當旁者謂所續之袵當身之一旁非爲餘袵悉當旁也云屬連之不殊裳前後者若其喪服其裳前三幅後四幅各自爲之不相連也今深衣裳一旁則連之相著一旁則曲裾掩之與相連無異故云屬連之不殊裳前後也愚按如孔疏之言則集說楊氏以覆縫爲鉤邊恐未然大全嚴陵方氏曰袵襟也亦恐小異深衣續袵鉤邊楊氏復曰鉤邊如今之覆縫蓋以邊爲每布幅之邊非謂裳之邊也於邊已縫而覆其縫是鉤之也蓋裳幅既皆斜裂不鉤之則恐不牢矣鄭注云鉤邊若今曲裾今不識曲裾之制何似意者如盤領袍之加兩擺歟然如孔疏一旁有曲裾一旁無曲裾則亦不稱矣深衣裁制之法瓊山邱氏爲詳但十有二幅當總衣裳言之未可以裳之一幅分兩者爲十二幅今兩身兩袖只四幅裳六合十幅耳布幅之廣二尺二寸若於背幅裁去四寸則衣身之廣只各得一尺八寸加兩袖各二尺二寸每旁只得四尺又減去縫縫袂之長僅及指記曰袂之長短反絀之及肘四幅之布袂不能反絀及肘矣是兩袖當各加一幅所謂長中繼掩尺者如此則衣亦六幅是十二幅以應十二月也若萬氏加兩衿及揷角之說則斷不可從儒行云其過失可微辨而不可面數也鄭注孔疏皆無解集說吕氏云此一句尚氣好勝之言於義理未合近世講家則云不可面數微辨即改不待面數也此正勇于改過處愚按此說勝于吕氏毁方而瓦合鄭注云去已之大圭角下與衆人小合也孔疏云方謂物之方正有圭角鋒鋩也瓦合謂瓦器破而相合也又云圭角謂圭之鋒鋩有楞角言儒者身恒方正若物有圭角不欲異衆過甚去其大圭角言猶有小圭角也黄氏日抄云毁方毁去其圭角瓦合委曲相合如瓦之覆屋也愚按此皆主涵容言與後所謂砥礪廉隅者不同集說所解殊迂滯儒行篇語自多不醇不必一一强爲回䕶爲人父者以爲父鵠孔疏云中則任爲人父不中則不任爲人父故爲人之父者以爲父鵠以下放此愚按此說得最明蓋當時以射習人於禮樂故視射之鵠如已之道猶今之以經義習人也集說不分明爲人父者以爲父鵠爲人子者以爲子鵠此以繹志言之視射此鵠如自己爲父爲子之道爲父者惟恐在己不能盡父道爲子者惟恐在己不能盡子道而皆必求其盡以此心射鵠則亦惟恐不能中鵠由於己之未能盡道也孔疏亦未甚明白大司徒文日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂此是以地中爲準而較其四面之長短與冬至景長夏至景短之長短又不同與日極南至牽牛極北至東井之南北亦不同鄭注云日南是地于日爲近南也日北是地于日爲近北最明賈疏五表之說亦甚詳又按觀此則里差之法自古有之堯典羲和分驗四方亦是如此日南景短日北景長日東景夕日西景朝是八尺之臬之景夏至景短冬至景長亦是此八尺之臬之景土圭長尺五寸以夏至之日午樹臬測之其景之長如土圭則爲土中自土中而北則去日漸逺而景漸長五百里而長及一寸自土中而南則去日漸近而景漸短亦五百里而短一寸自土中而東則午漏而景已斜自土中而西則午漏而景未正此以日景測地之四方也夏至日景最短土中只尺五寸此後以漸而長至冬至而最長冬至後又以漸而短至夏至而最短此由日之在天夏則行南陸而去中國近冬則行北陸而去中國逺也此以日景測天之四時也堯典寅賓出日以春分卯中而日出卯位其景正西指酉也敬致以夏至日中午刻而景正指子也寅餞納日以秋分酉中而日入酉位其景正東指卯也此以四方正四時也臬八尺法中人之身人參天地爲三才也土圭尺五寸兼三才而五之法五行也小司徒伍兩卒旅之制鄭注止云此皆先王所因農事而定軍令者也却不引管子内政軍令之文蓋不欲合王伯而一之也賈疏引管子語以實之失其意矣小司徒伍兩卒旅之法因農以出軍也管子軌里連鄉之法厲農以奉軍也王霸正相反而賈疏引之亦不詳矣老子謂道可道非常道又云上德不德是以有德下德不失德是以無德又云失道而後德失德而後仁失仁而後義失義而後禮賈疏以師氏至德與老子常道及上德不德爲一是燧皇以上無名號之君所行以敏德與老子可道之道及下德不失德失道而後德爲一是三皇五帝所行以孝德與失德而後仁失仁而後義失義而後禮爲三王所行又以仁義爲五帝三皇所同有唐初儒者猶崇信老莊往往引以解經而不辨其與儒家同異處此其所以爲陋也師氏之至德即大司樂六德之中和也敏德即祗庸也孝德即孝友也至德者性情之極至中則至靜而無少偏倚和則發之而無過不及也敏德者存省之不怠祗則戒懼無間於須臾庸則好惡必求其自慊也孝德者愛敬之真誠孝則敦其仁於一本友則自本而推之也老子道可道則非常道以無名無爲爲自然之至也上德不德是以有德若下德不失德則斤斤於有所守矣是以不足爲德以其有爲也漢唐儒者不足以知道而善於附會如此類者不一而足矣土均職有禮俗二字康成謂是先王舊禮賈疏云俗者續也愚按有禮俗有俗禮禮俗不可變故曲禮云君子行禮不求變俗而康叔封衛亦因殷舊俗禮則不可徇然鄭注于誦訓之方慝亦引曲禮此語疏云土均是謂先王舊禮此謂不變其鄉俗然則俗禮亦未可輕變歟禮俗有禮之俗也如冠禮或三加而總一醮或毎加而皆一醴禮可並存因其舊俗可也俗禮則所謂委巷之禮非先王之舊者也然可行不可行亦當審其重輕焉如清明掃墓及端午中秋俱俗節古人所無然今已有之則亦不可不行也如居喪作佛事及以酒食延賓及分弔帛於弔者此背乎先王之禮而必不可行者也又如居喪而不免於出弔生日而不免於慶賀娶婦而不能六禮之備期功而不免從王之事此亦皆非禮而不可行而在俗又不能盡違者則不得已而從俗行之然君子要必有不安於心者若竟以流俗爲安則廢禮將無所不至矣司尊彞注云變朝踐爲朝獻者尊相因也變再獻爲饋獻者亦尊相因愚按祭禮有祼有朝踐饋獻酳尸酳尸即饋食之禮也朝獻者即王之酳尸也再獻者即后及賓之酳尸也此經于春夏則言朝踐再獻于秋冬則言朝獻饋獻是省文互文之法祼用鬱鬯王后各一祼爲初獻再獻朝踐薦腥王后各一獻爲三獻四獻饋獻獻熟體解而爓之未全熟也無黍稷王后各一獻爲五獻六獻此皆堂上事然後隂厭而延尸入室饋食至此乃全熟之有黍稷已食而酳尸王后各一酳爲七獻八獻賓長畢九獻焉冢人先王之葬居中以昭穆爲左右鄭注云先王造塋者昭居左穆居右夾處東西賈疏云若文王在豐葬于畢子孫皆就而葬之即以文王居中則武王爲昭居左成王爲穆居右康王爲昭居左昭王爲穆居右已下皆然至平王東遷死葬即又是造塋者子孫據昭穆夾處東西若兄死弟及俱爲君則以兄弟爲昭穆以其弟已爲臣臣子一列則如父子故别昭穆也必知義然者案文二年秋八月大事於太廟躋僖公謂以惠公當昭隱公爲穆桓公爲昭莊公爲穆閔公爲昭僖公爲穆今升僖公于閔公之上爲昭閔公爲穆故云逆祀也知不以兄弟同昭位升僖公于閔公之上爲逆祀者按定公八年經云從祀先公傳曰順祀先公而祈焉若本同倫以僖公升于閔公之上則以後諸公昭穆不亂何因至定八年始云順祀乎愚按閔昭僖穆僖昭閔穆順逆只在二公若文公則坐定是昭矣以後諸公昭穆何由而亂賈疏此條殊不可解昭穆之序如閔公僖公以兄弟相繼閔公當昭則僖公多一昭廟同在昭而僖在閔下多一廟而實只四世不害也所謂逆祀者躋僖于閔上故不可耳若閔昭僖穆則文公當穆而又昭世次豈不以此亂乎大司樂奏黄鍾歌大吕疏云欲作樂先擊此二者之鐘以均諸樂是以鐘師云以鐘鼓奏九夏鄭云先擊鐘次擊鼓論語亦云始作翕如也鄭云始作謂金奏是凡樂皆先奏鐘以均諸樂也愚按據此則樂以律爲本八音之律又以鐘爲本鐘之律定而後八音之律可定也故鄭又引伶州鳩之言曰律所以立均出度古之神瞽考中聲而量之以制度律均鐘天子之樂鎛鐘十二應十二正律歌鐘笙鐘則有半律變律變半律皆特懸如十二辰之位歌鐘笙鐘則或十二或十六皆編懸也特磬十二亦如之所謂宫懸也如十二辰之位是環列如宫也如奏黄鍾之宫則以黄鍾起調先擊黄鍾之鎛鐘以聲之笙簫箎管塤􅐟皆翕然應此而起中間逐聲之起止則又以笙鐘發逐聲之聲笙磬收逐聲之韻鼔鼙居中爲節鼗居上下句之間其黄鍾宫則林鍾爲徵太簇爲商南宫爲羽沽洗爲角應鍾爲和變宫蕤賓爲繆也此用七律皆以笙鐘宣其聲笙磬收其韻也及夫奏終則必於末一聲仍收歸黄鍾律而後擊黄鍾之特磬以收之若奏太簇則亦以太簇鎛鐘起以太簇特磬收之如歌大吕之宫則以大吕起調先擊大吕之鎛鐘以聲之琴瑟及歌皆翕然應此而起中間逐字之起止則又以歌鐘發逐字之聲頌磬收逐字之韻搏拊鼔朄爲之節鼗居上下句之間其大吕宫則夷則爲徴夾鍾爲商無射爲羽仲吕爲角變半黄鍾爲和變宫變林鍾爲繆變徵及夫曲終則必於末一字仍收歸大吕律而後擊大吕之特磬以收之若歌應鍾亦然也凡鎛鐘特磬倍於笙鐘笙磬笙鐘笙磬倍於歌鐘頌磬堂上貴人聲尚輕清也然金奏又有與笙奏不同者大樂有鐘曰金奏如左傳金奏肆夏之三小樂無鐘則曰笙奏如鄉飲酒禮笙奏南陔白華華黍凡樂事今人全不知理會矣大司樂圜鍾爲宫條鄭注云先奏是樂以致其神禮之以玉而祼焉賈疏謂據小宰注天地大神至尊不祼又玉人典瑞宗伯等不見有宗廟禮神之玉此言玉止據天地言祼止據宗廟愚按依此則書言植璧秉圭只是變禮外神有玉無祼宗廟有祼無玉金縢植璧秉主此有事祈禱非祭祀也祈禱告請或用玉或制幣此無牲者也圜鍾爲宫一條不用隔八相生之正法鄭注有避有不用之說不知果合當時之意否存其說而闕疑可也又鄭注云凡五聲宫之所生濁者爲角清者爲徵羽賈疏曰或先生後用或後生先用又鄭注云此樂無商者祭尚柔商堅剛也愚按此則言律吕者所當知凡樂圜鍾爲宫一條圜鍾爲宫則無射爲徵仲吕爲商變半黄鍾爲羽變林鍾爲角變半太簇爲和變南宫爲繆即夾鍾宫調也凡以宫發聲則爲宫調以角發聲則爲角調其徵調羽調放此黄鍾爲角者以變半黄鍾爲角則是以變林鍾爲和變太簇爲繆夷則爲宫夾鍾爲徵無射爲商仲吕爲羽此夷則角調也太簇爲徵者以太簇爲徵則是以南宫爲商以姑洗爲羽以應鍾爲角以蕤賓爲和以大吕爲繆以林鍾爲宫此林鍾徵調也此調中太簇姑洗大吕皆只用半律姑洗爲羽者以姑洗爲羽則應鍾爲角蕤賓爲和大吕爲繆林鍾爲宫太簇爲徵南宫爲商皆如上鈞其姑洗蕤賓林鐘太簇亦皆只用半律而以姑洗發聲是林鍾羽調也下禮地示神鬼二條所言法亦以此推之四聲而無商者不用商調耳若一曲中皆無商聲則必不可用也如謂不用隔八相生之法則如以夾鍾黄鍾太簇姑洗四律合爲一曲而奏之豈復成曲况清濁與律又不相應乎鄭賈皆長於數典而不知樂律所謂達於禮而不達於樂謂之素者歟稼書先生亦未考西山律吕新書及朱子論樂之說矣樂師舞先鄭云宗廟以羽後鄭云宗廟以人然春秋初獻六羽不知後鄭如何解羽皇旄帗干人等舞羣祀有分用而干羽爲正宗廟兼用二鄭之說皆非大師賈疏謂康成律娶妻而吕生子之義皆本律厯志可見讀經不可不知史典同賈疏謂鬼谷子有飛鉗揣摩之篇皆言從横辨說之術飛鉗者言察是非語飛而鉗持之揣摩者言揣人主之情而摩近之愚按四字說盡從横人肺肝以律生吕謂之娶妻以吕生律謂之生子律本位而吕居衝亦其義也鞮鞻氏掌四夷之樂與其聲歌鄭注曰言與其聲歌則云樂者主於舞疏曰凡樂止有聲歌及舞既下别云聲歌明上云樂主於舞可知也愚觀此則論語言樂正又言雅頌得所樂自樂雅頌自雅頌可見朱註以詩樂並言此不易之論也說者因鄭夾漈言詩者用以歌而非用以說義遂謂雅頌即是樂此亦拘矣不知夾漈之言本偏謂詩用以歌可也謂非以說義則不可虞書言詩言志歌永言聲依永律和聲律生于詩者也如鄭此言則詩反生于律矣且如夾漈說則興于詩成于樂亦將合而爲一乎又有因夾漈之說遂謂孔子有正樂之功無刪詩之事者其誣抑甚矣此特見延陵觀樂時雅頌具在詩未嘗亂無待刪然則延陵觀樂之時樂亦何嘗亂乎今日詩樂舊本既亡故不見夫子刪正之妙若使無夫子刪正則詩樂謹足動賢者之觀聽豈足爲萬世之凖繩乎延陵之嘆樂猶之韓起之嘆春秋耳詩言志歌永言聲依永律和聲此以詩歌之聲合之律吕之聲以人氣合之天地之生氣所謂審一以定和此非詩生于律亦非律生于詩也詩之與樂有分有合分之則詩有文字義理所以言志所謂文足論而不息其義顯而易見故詩可别爲詩教及以詩合之音律而動爲歌舞則又有聲可聽有容可觀而聲容皆合於生氣之和五常之行所謂聲足樂而不淫其感人又有神於不知不覺而與之俱化者故樂又别爲樂教也故詩主於文字可以兼收貞淫以使人知所好惡樂主於聲容則鄭聲不可不放以使之一於和淡此興於詩成於樂之所以有分也鄭夾漈謂詩用以歌而非用以說義其言誠有偏矣若合之則詩即樂之章歌即永其詩之聲舞亦動其詩之容言之不足故長言之長言之不足故嗟嘆之嗟嘆之不足則不知足之蹈之手之舞之矣先王恐其聲其容之以盈而不能反也故律吕以範之行綴以齊之是歌舞聲容又豈有離詩而貳之者哉韶咸夏濩皆必有詩而今不可考大武之六詩則猶多存周頌中左傳可証矣成周制作擇其詩之正者被之管弦協以歌舞而用之宗廟朝廷邦國及於鄉閭又及於房中别其崇卑大小使各有定制樂制既定則音律有殊而器數之大小多寡亦因之以異其餘詩有不盡於正者非不可被以管弦協以歌舞合於音律但以其不能皆正則惟是存其篇什以資講論是故風雅頌各有正變以正樂有用不用之故也變雅中亦有用者如豳雅豳頌之類然其音節器數又必稍異迄夫詩既殘缺失次則音律器數皆無不亂而樂之用皆失其所風有風之音節雅分大小有大雅小雅之音節頌有頌之音節如今以仙吕調曲辭而錯在雙調曲中以雙調曲辭而錯入搬沙調中則唱之必不合犯只是胡亂唱矣以失其犯則失其音律也雅有雅之器頌有頌之器故有雅瑟頌瑟雅塤頌塤之别大抵頌器小於雅如今曲有宜用笙笛配者有宜用瑣呐配者音節既亂又用非其所則器數亦無不皆亂矣是故大武聲淫及商則是音律之失正也商是商調之音非商朝也燕使臣而歌湛露彤弓金奏肆夏工歌文王是所用之失正也此必當時詩之篇冊陵亂散失故樂人隨手拈用又加之以自作聰明故失之如此夫子敘雅頌之篇章使各還其次序是雅頌既分明則雅頌之音律亦得分明而雅頌各篇之用處亦得分明器數聲容無不正矣故定詩即以正樂而雅頌得所即樂正之實詩樂原非兩分而稼書先生謂樂自樂詩自詩詩樂並言分爲兩事其意謂樂主于舞亦未是也卜師四兆鄭注謂占兆之書分為四部若易之二篇其云方功義弓之名未聞愚按卜筮一理而龜書獨不傳聖人贊易之功豈不大哉詩如易上下兩經本子樂如揲蓍求卦而用之今使易經本子卦爻辭皆缺亂則揲蓍所得之卦亦亂道而失其象占矣卜繇既亡龜卜遂不傳今之用錢卜易者其說皆離宗亂道以不識易經本子故也馮相氏言冬夏致日春秋致月以辨四時之敘賈疏謂四時之景合度乃德政所致故晷進則水晷退則旱愚按若以今厯家言之則此皆由厯之疎宻耳顔氏家訓省事篇内有一條論此最明蓋二說當並存寒暑失時風雨不節此德政有以致之若日晷長短進退則由於厯之疎宻馮相疏謂大歲在地與天上歲星相應而行一歲移一辰又分前辰爲一百三十四分而侵一分則一百四十四年跳一辰歲星爲陽人之所見太歲爲隂人所不睹又曰今厯無跳辰之義故注云今厯大厯非此也愚按既不是跳辰之大歲則所指又是何太歲即甲子乙丑以數年者耳無所謂在隂也歲星雖曰歲移一辰而行有疾遲參差不與歲應又其行常侵入前辰非跳過一辰也分野之說賈疏謂此古之受封之日歲星所在之辰此補鄭注所不及其說甚是分野之說賈疏謂古受封之日歲星所在之辰甚善然古人則天垂象主其事則祭其星故祝融分柳星張閼伯分大火又太皥分角亢炎帝分翼軫黄帝分析木少皥分奎婁顓頊分室壁皆因所王之德義各有取後世居其土者則因之而已後世乃分别郡邑謂某郡某地入某宿某度則多見其惑也而固者又謂天體覆冒天下無分野之說則又失之不考其故矣外史掌達書名於四方鄭注謂若堯典禹貢達此名使知之或曰古曰名今曰字使四方知書之文字愚按朱子中庸註是用其後一解六體爲書象形會意指事轉注諧聲借用四聲五音曰名四聲平上去入五音如喉齒牙舌脣及合口開口齊齒啟脣提口閉口卷舌上舌諸呼法之類書有定體近於禮名有定聲通於樂書體自篆變而𨽻又變而楷而鍾王輩又徒逞其筆姿以悅人目是以古體日趨於訛書體日訛而呼名亦以日舛古道之賊也况禮樂乎許慎說文甚有功於書學朱子嘗稱其説之精沈約四聲猶留古之遺音而邵子亦稱其爲知道以其始於一東合口之音然後以漸而發揚終於十五咸閉口之音是隂陽闔闢始終之道其分一東二冬皆有深意而今人不識之矣明太祖洪武正韻以正字體而别韻不取沈約張爾公増補字彚以明音釋而說義不取說文皆師心自用也參讀禮志疑卷下
