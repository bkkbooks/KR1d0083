body:
  text: 參讀禮志疑禮類四三禮總義之屬提要臣等謹案參讀禮志疑二卷國朝汪紱撰紱一名烜字燦人婺源人是書取陸隴其所著讀禮志疑每條標列而以己意附參於各條之下其於三禮大端若謂南郊即為圜丘大社即為北郊禘非祭天之名路寢不得倣明堂之制又力斥大饗明堂文王配五天帝武王配五人帝之說皆主王肅而黜鄭𤣥故與舊注相左其顯然舛誤者如謂東西夾室不在堂之兩旁而在東西房之兩旁考儀禮公食大夫禮公迎賓入大夫立於東夾南士立於門東小臣東堂下宰東夾北內官之士在宰東上介門西蓋均即位於堂之上下如紱所云則大夫及宰乃違衆而獨立於堂後及東西房兩旁隱蔽之地又聘禮設飱亦云堂上之饌八西夾六蓋致饌於賓其陳設皆自堂及庭及門取其羅布目前如紱所云則饌亦設於堂後矣有是理乎紱又謂士無朝服𤣥端即士之朝服上士𤣥裳中士黃裳下士雜裳考士冠禮曰主人𤣥冠朝服緇帶素韠既云素韠則素裳矣與卿大夫以上之朝服初無以異未嘗獨以黃裳𤣥裳雜裳之𤣥端為朝服也又魯語曰士妻朝服則士固非無朝服紱特未之深考耳至所謂大夫士無西房故士喪禮主人括髮衆主人免於房而婦人乃獨髽於室以無西房故也其說本孔疏可破陳祥道禮書之惑又謂大夫士廟亦當有主與通典所載徐邈及清河王懌之議相合如斯之類亦多深得經義固可與隴其之書並存不廢也乾隆四十二年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:eec5f9aaacf2531442bd7b5acbbe8ed400ae4cc8f5ae9c4b14e8254d206e5b35
