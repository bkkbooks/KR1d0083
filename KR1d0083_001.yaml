body:
  text: 參讀禮志疑卷上婺源汪紱撰今之談經者於易則欲羅侔京王何於書於詩則欲搜小序箋疏以朱蔡為少也獨於禮則望漢儒注疏而郤行雖雲莊集説亦倦然而不戡卒業矣夫焦京流於術王何入於玄書詩之大小序則附會穿鑿而不復察於本篇之意旨所存漢唐諸儒惟事訓詁多為枝葉不有朱蔡何以大其廓清之功乎禮則不然禮謹節文禮之迹存乎器數節文器數與俗更革去古日逺其迹日湮數千百年而失亡盡矣漢儒去周未逺周之所遺車服禮器或有存者漢初猶及見之而孔壁逸禮五十篇孔鄭猶得而參考焉雖其雜引讖緯不無失之誣妄而器數名物迄今可考則非孔鄭馬賈不為功非若易之定象定理詩之歌詠性情書之紀載政事可以會心得之千百年可通寤寐也大抵言事理而見古人之心漢儒所短考器數而得古人之制漢儒所長然則禮經無漢儒今人幾不識耳目何加進退何所矣今人於漢儒所短則欲收之於漢儒所長則怠倦置之何傎於擇乎稼書先生之讀禮也凡有疑義必考悉於注疏而不敢遺非不憚煩蓋不如是不敢安讀經求實得也禮以敬為本籩豆之事則有司存然不有籩豆敬何所將在今日又將以籩豆為要也朱子曰孔子稱禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉然古人猶識得玉帛鐘鼓今人則併玉帛鐘鼓皆不識矣蓋傷之也朱子又嘗稱鄭康成為漢大儒而儀禮經傳通解成於黃勉齋亦不能遺注疏以别為考索也然則稼書先生之志不可尚歟愚是以喜讀其書而時或旁參一説焉謂疑有同心亦復識之且欲為世之好異而畏煩者告也爾雅云無室曰榭邢疏云榭有二義一者臺上構木曰榭月令可以處臺榭是也一則無室者名榭其制如今廳事春秋成周宣榭火是也郭注榭即今堂隍者堂隍即今殿也殿亦無室故云即今堂隍愚按觀此可知堂與廳之别家禮所謂遂遷于廳事榭序也序主於習射故榭字從射又或作豫序榭豫皆音之轉也古堂室之制南北四分之前三為堂後一為室則承棟之兩楹近堂北楹北一楹南二榭制無室則兩楹當南北之中故鄉射禮曰豫則鉤楹豫即序也序之兩楹當南北之中故升射者升自西階直行至楹之北然後轉而東鄉各當其物然後北行而履物是鉤楹以內也若射於庠則庠有室而楹近堂北升射者自楹之南遂東鄉各當其物乃北行履物不必鉤楹也凡堂必為臺故升堂有階前則東西階旁則側階室之後有內階是堂室皆處臺上也故凡臺上構木亦曰榭也臺上構木者亦無室也堂有室者東西五分之實六分之中兼二分室東西為東西房房東西為左右夾室鄭康成云房當夾室北蓋由房入夾室則自房之北而轉入耳謂之夾室則自當夾在房之東西也士大夫無西房蓋東西亦三分之也室二分房一分室中戶在東南牖在西南室西南隅曰奧西北隅曰宧音夷東北隅曰窔音杳堂上戶牖之間曰扆兩楹之東西曰廂兩廂之東西近牆曰序喪服傳既練舍外寢鄭注舍外寢於中門之外屋下壘墼為之不塗塈所謂堊室也賈疏云練後不居舊廬還於廬處為屋但天子五門諸侯三門大夫士惟有大門內門兩門而已無中門而云中門外者案士喪禮及既夕外位惟在寢門外其東壁有廬堊室若然則以門為中門據內外皆有哭位其門在外內位中故為中門非謂在外門內門之中為中門也愚按家禮各歸喪次條下云中門內外而不詳中門為何門必看賈疏乃明中門即寢門注疏亦多疏略如既夕篇窆及反哭皆云拾踊三拾更也投壺則拾投哭踊則拾踊皆更為之也注疏止云拾更也而不詳其義又不注於窆而注於反哭前後倒置如雍正雍府不注於特牲而注於少牢亦然三跳足為一踊如賓主拾踊則主人一踊賓一踊主人又一踊更迭為之各九跳足成三踊也士喪禮上下二篇止有主人拜賓之文而於柩於重於奠皆未嘗拜至士虞禮設饌後始言主人再拜稽首自虞以前豈經文略而不言歟抑主哀不主敬而不拜歟賓之弔奠賵贈亦皆不言拜喪禮急遽初喪尤甚虞禮以前皆不言拜蓋不拜也與吉反也牲體之數陳祥道禮書曰前脛骨三肩臂臑也後脛骨三肫亦作膊胳亦作骼觳也脊骨三正脊脡脊橫脊也脅骨三代脅長脅亦曰幹短脅也正脊之前則膉也亦謂之脰肫之上則脾也然則左右肱之肩臂臑與左右股之肫胳觳而為十有二脊骨三與左右脅骨六而為九觳正祭不獻神尸主人之俎兩髀不升於主人主婦之俎膉不升吉祭之俎則祭之所用者去髀膉而二十有一去二觳而為十九矣士喪禮特豚四鬄去腣兩胉脅也脊肺既夕鼎實羊左胖豚亦如之然則四鬄者殊左右肩髀而為四又兩胉一脊而為七此所謂豚解也士喪禮略豚解而已至虞然後豚解體解兼有焉若夫正祭則天子諸侯有體解豚解大夫士有體解無豚解以其無朝踐獻腥之禮故也此一條最明但又曰國語禘郊之事則有全脀王公立飫有房脀親戚燕饗有殽脀則全脀豚解也房脀體解也殽脀骨折也此一條方氏古今考深以為非曰孔穎達左傳疏全其牲體而升于俎謂之全脀豈祥道豚解七體乎半解牲體而升於俎謂之房脀祥道謂體解二十一體可乎體解節折而升於俎為折俎為殽脀祥道何故以折俎解房脀而不解殽脀乎其誤也根於康成愚按豚解非全脀當以方氏之説為是康成注禮運云腥其俎謂豚解而腥之熟其殽謂體解而爓之雖亦引國語全脀房脀為證然賈公彥儀禮小斂疏云禘郊先有全脀後有豚解體解是康成亦非以豚解為全脀但説得未明致陳氏之誤耳牲體全升於大俎曰全脀郊禘用之四鬄七體曰豚解天子諸侯朝踐有之大夫士喪禮既夕亦有豚解左肩右肩前足左髀右髀後足此四鬄也兩胉左右脅一脊脊骨此合四足為七體也腥俎也禮運腥其俎體解而升於折俎曰殽脀燕饗饋食皆用之肩左右肩臂左右腕臑左右蹄此分前足左右各三體也肫亦作膊左右近髀處胳亦作骼後左右腕觳後左右蹄觳正祭不以獻後蹄賤之也此分後足左右各三體也正脊項後背上脊並兩肩脡脊正脊之下旁並兩脅橫脊脡脊之下旁並長短脅間代脅左右肩下之兩脅長脅代脅後其脅骨長短脅長脅後肫之前其脅骨短此分一脊為三兩胉為六合之則二十一體也熟俎也禮運熟其殽膉不升吉祭之俎膉者正脊之前頸間也亦謂之脰此肉今人亦賤之謂之槽頭兩髀不升於主人主婦之俎肫之上短脅之後近尾處也以近後故亦賤之然記曰殷人貴髀則亦或升於俎惟近下竅處則截棄之首則先升於室禮記升首於室此三體不在殽脀之數合髀膉則二十三體合首則二十四體去髀膉及首二十一體去兩觳則十九體又半體而升於俎曰房脀王公立飫時用之祀事用右胖詩曰籩豆大房大房即半體之俎也腥之蓋惟郊禘有全脀有祼鬯則有房脀有朝踐之事則有豚解惟饋食之事則殽脀體解一獻熟之而已茅之於祭有二用鄭康成周禮注云茅以共祭之苴亦以縮酒最明共祭之苴則鄉師所謂茅蒩及易之藉用白茅士虞禮之苴刌茅皆是也亦以縮酒則甸師所謂蕭茅及左傳之包茅不入皆是也若禹貢之包匭菁茅則似兼此二者之用茅蒩刌之以藉牲刌之者截去其不齊而使之齊也亦以藉器皿之類菁茅以縮酒禮記曰縮酌用茅明酌也是因五齊及鬱鬯皆渾故涗之以他酒而藉茅以泲之使清耳書儀立茅於神座前而以酒酹之象神之飲之也似非古人用茅之意士虞禮有苴茅設於几東席上佐食取黍稷祭於苴三取膚祭祭如初此亦非以酹酒士虞禮祝聲三啓戶注云將啓户警覺神也疏引曲禮將上堂聲必揚為例可想見古人祭祀曲盡鬼神之情士虞禮祝聲三啓戶他篇祭禮則無之蓋虞始立尸而事之以神故有此節吉祭似不必用他祭亦無茅蒩朱子語類云魯共王壞孔子宅得古文儀禮五十六篇其中十七篇與髙堂生所傳十七篇同鄭康成注此十七篇多舉古文作某則是他當時亦見此壁中之書不知如何只解此十七篇而三十九篇不解竟無傳焉愚按焦弱侯經籍志云永樂中御史沅洲劉有年獻儀禮逸經十有八篇時未加表章旋就湮沒夫程朱大儒所未見者有年何從而得之此非偽書則必纂輯諸經之文而成之如吳草廬儀禮逸經之類焦氏信為古經出千百世之後則愚矣孔壁儀禮五十六篇而康成只注十七篇餘三十九篇不注蓋此十七篇有髙堂生所傳今文可以考據餘篇蝌蚪古文又積歲久逺無他本可以考證則有難盡通者故寧闕之亦古人之慎也朱子謂儀禮疏説得不甚分明愚按如豚解體解與全脀房脀異同之處是亦不分明之一端也又如朱子疑緦十五升抽其半然小功十二升則其縷反多於緦矣又不知是如何疏亦不見分明又如朝一溢米賈疏最煩然古稱有二法律歷志與左傳注不同處孔氏喪大記疏言之甚明而賈疏却不及緦服十五升而抽其半則似止七升半近義服之齊衰矣或曰布皆雙扣緦布十五升而單扣也此似可通喪大記小斂主人袒説髦括髮以麻婦人髽帶麻于房中鄭注云婦人之髽帶麻於房中則西房也天子諸侯有左右房孔疏云於房中者謂男子説髦括髮在東房婦人髽帶麻於西房也士喪禮主人括髮袒衆主人免於房婦人髽於室以男子在房故婦人髽於室大夫士惟有東房故也愚按大夫士無西房陳氏禮書不欲從康成之説以此處證之則知康成之説不可易矣陳氏集説及大全於此處並未分别東房西房殊為疏略王侯有東西房則主人袒説髦括髮以麻於東房婦人髽帶麻於西房男子重首故言括髮婦人重帶故言帶麻喪大記小斂條於房中三字蓋總兩句統主人婦人東西房而言也大夫士無西房故主人括髮袒衆主人免於房即東房婦人髽於室此最明白喪大記士之喪二日而殯此承上文大夫來蓋士之禮死與往日生與來日大夫以上皆以來日數故在士為三日而殯者在大夫視之則止是二日也陳氏集説及大全皆略不言曲禮內陳氏亦不言死與往日是士禮士之禮死與往日則二日而殯實亦三日踰月而葬實亦三月可知然不滿其數也大夫以上不然則皆數來日三日而殯在第四日三月而葬在第四月實則滿三日三月之數也五月七月皆然然春秋時其禮已亂矣喪大記君設大盤一節舊本在始死遷尸於牀之前孔疏雖云宜承濡濯棄於坎下札爛脫在此耳而仍不易其舊古人疑則傳疑之意也陳氏竟易置之而又注明其舊次則近武斷矣如雜記之內子以鞠衣及練則弔皆然陳雲莊有武斷處然尚不似吳草廬自用之甚士虞禮及間傳中月而禫喪服小記祔必以其昭穆亡則中一以上二中字注作間字解曲禮上生與來日死與往日二與字注作數字解皆他處所少中之訓間猶其踰過中間也朱子雖云漢儒説禮制有不合者皆推之以為商禮此便是沒理會處然亦確有是夏商之禮不可牽合者須平以審之朱子云漢儒説禮制有不合者皆推之以為商禮如春礿夏禘漢儒以為夏商祭名則愚不敢信禘只是追享大祭三代皆同袁了凡羣書備考言注儀禮者鄭玄為之疏者賈逵也以賈公彥為賈逵疏謬如此豈不誤人漢有賈逵唐有賈公彥漢有孔安國唐有孔穎達人多混之士喪禮君視大斂祝負墉南面鄭注云祝南面房戶東鄉君喪大記亦有負墉南面之文鄭注亦以為在房戶東乃儀禮刋本將房戶誤作房中楊氏圖因之遂列祝於房中不知君將視祝而踊若在房中則逺於君矣安能視之而踊以禮記注證之可見况房無北壁見於朱子答趙子欽書安得房中有墉士喪禮君視大斂祝負墉南面此墉即房之外墉所謂房戶東也房無北墉故又曰北堂以房戶作房中者誤甚月令孔疏引太史職鄭注云中數曰歲朔數曰年中數者謂十二月中氣一周總三百六十五日四分之一謂之一歲朔數者十二月之朔一周謂三百五十四日謂之為年此是歲年相對故有朔數中數之别若散而言之歲亦年也故爾雅釋天云唐虞曰載夏曰歲商曰祀周曰年是也又玉藻上大夫曰下臣擯者曰寡君之老疏曰在客曰介當云介而云擯者擯介散文則通也又康成大宗伯注曰出接賓客曰擯入詔禮曰相疏云此對文義耳通而言之出入皆稱擯也又大司樂奏黃鍾歌大吕疏云據出聲而言曰奏據合曲而言曰歌其實歌奏通也大司樂奏黃鍾歌大吕奏者堂下之樂金奏笙奏以聲不以辭也歌者堂上之樂工歌升歌人聲而和以琴瑟也奏以律堂下曠而發陽歌以吕堂上狹而隂靜故奏黃鍾則歌大吕奏太簇則歌應鐘奏㽔賓則歌林鐘奏無射則歌圜鐘奏夷則則歌小吕奏姑洗則歌南吕一奏一歌皆取天地之合氣斗柄建子則日在丑初昏建丑則日在子故子與丑合建寅則日在亥建亥則日在寅故寅與亥合建戌則日在卯建卯則日在戌故卯與戌合建辰則日在酉建酉則日在辰故辰與酉合建申則日在巳建巳則日在申故申與巳合建午則日在未建未則日在午故午與未合斗柄初昏所建以地位定方日躔所在之辰以行天分次故以為天地之合氣疏云據出聲而言曰奏據合曲而言曰歌歌奏相通非是且出聲以黃鍾則其曲即黃鍾起調矣安得有出聲以黃鍾而合曲在大吕者乎鄭康成既夕注云牆有布帷柳有布荒喪大記注又云在旁曰帷在上曰荒皆所以衣柳也則帷荒總名為柳賈公彥疏云對而言之則帷為牆象宫室有牆壁荒為柳以其荒有黼黻及齊三采諸色所聚故得柳名柳之言聚也總而言之皆得為牆巾奠乃牆及檀弓云周人牆置翣皆牆中兼有柳縫人衣翣柳之材柳中兼牆愚按經文用字有此對言總言之二法不可不知注疏亦謂之對文散文又曲禮效犬者左牽之疏云通而言之狗犬通名若分而言之則大者為犬小者為狗又周禮疏曰五齊對三酒酒與齊異通而言之五齊亦曰酒又如封人疏云有足曰蟲無足曰豸程大昌作袒免辨謂解除吉冠是之謂免免之為言正是免冠之免不應别立一冠名之為免而讀之如免也古今言以布繞頂及髻而謂之為免者惟鄭氏一人愚按賈氏喪服疏孔氏喪服小記疏言括髮免髽之制詳矣程氏欲舉而盡廢之不免武斷况喪服小記明言斬衰括髮以麻免而以布問喪明言不冠者之所服也則免非徒免冠可知惟服問云凡見人無免絰則當如免冠之免喪服之免音問為言挽也以布挽頂及髻也程大昌欲如字讀以為免冠而已者誤矣喪服小記明言免而以布安得謂鄭説為非乎見人無免絰之免當如字冠無免之免亦不當音問喪服小記云為殤後者以其服服之鄭注云言為後者據承之也殤無為人父之道以本親之服服之疏云此論宗子殤死族人不得以父道為後之事集説謂以其服服之者子為父之服也鄭孔之説為長宗子已立為宗子而殤其庶子子有可後者則後之矣若庶兄已有子而庶兄又已死則其子可後宗子矣後之則為之子而以父服服之矣宗子殤而無可後者則殤之矣厭祭不尸殤之則各以其服服之矣謂只如本服中庸言周公追王太王王季大傳言武王克商即追王太王王季文王大傳之追王是加以王號中庸之追王是備其王禮孔疏云中庸追王是以王禮改葬則恐未必然大傳言武王追王太王王季蓋尊之以王號也書武成篇已以太王王季稱矣中庸言周公追王太王王季蓋始定王禮也然此亦無可定考矣大傳一條云自仁率親等而上之至於祖名曰輕自義率祖順而下之至於禰名曰重一輕一重其義然也一條云自仁率親等而上之至於祖自義率祖順而下之至於禰是故人道親親也愚按祖以義為主故義屬祖禰以仁為主故仁屬禰非謂事禰止用仁不用義事祖止用義不用仁也仁義之分配祖禰猶分配事親從兄親親敬長也觀兩條之末一則曰其義然也一則人道親親也則祖禰二者又皆可謂之義亦皆可謂之仁此仁義二字之錯綜交互者也又性理朱子有一條云以其性而言之則皆體也以其情而言之則皆用也以隂陽言之則義體而仁用也以存心制事言之則仁體而義用也此又仁義之錯綜交互者也自仁率親等而上之至于祖推愛父之心以愛祖愛以漸而殺服制亦漸殺故曰輕自義率祖順而下之至于禰祖尊于父曽祖又尊于祖故曰重彌上彌尊彌近彌親也服問云母出則為繼母之黨服母死則為其母之黨服為其母之黨服則不為繼母之黨服鄭注云雖外親亦無二統孔疏不詳臨川吳氏曰母死謂己母死而父再娶雖有繼母而子仍服死母之黨詳其文義自合如此陳氏集説乃云母死謂繼母死也其母謂出母也殊謬母出則為繼母之黨服母死則為其母之黨服為其母之黨服則不為繼母之黨服此言生母為父所出而又再娶繼母則生母已絶於父故不得為出母之黨服而為繼母之黨服若生母先死而父再娶繼母則生母重矣故為生母之黨服而不復為繼母之黨服也必無繼母死而為出母之黨服之理雜記言大夫為其父母兄弟之未為大夫者之喪服如士服士為其父母兄弟之為大夫者之喪服如士服鄭注云今大夫喪服禮逸與士異者未得而備聞也春秋傳曰齊晏桓子卒晏嬰粗衰斬苴絰帶杖菅屨食粥居倚廬寢苫枕草其老曰非大夫之禮也曰惟卿為大夫此平仲之謙也言己非大夫故為父服士服耳粗衰斬者其縷在齊斬之間謂縷如三升半而三升不緝也斬衰以三升為正微細焉則屬于粗也然則士與大夫為父服異者有粗衰斬枕草矣詳鄭意是以晏子所服為先王之禮王肅則駁之曰喪禮自天子以下無等故曽子云哭泣之哀齊斬之情饘粥之食自天子達春秋之時尊者尚輕簡喪服禮制遂壞羣卿專政晏子惡之故服粗衰枕草於當時為重是以平仲云惟卿為大夫遜辭以避害也大夫與士異者大夫以上在喪斂時辨絰士冠素委貌詳王意是以辨絰委貌之異為先王之禮而晏子所服為周衰變禮二説雖殊然其以雜記之言為先王之禮則一也陳氏禮書云周衰禮變而齊之服於是有等故大夫以尊而伸服斬衰枕凷士以卑而屈服齊衰枕草而已禮記或記先王或記末世其可以末世之事而論先王之時哉鄭氏以此為真先王之禮宜為王肅之所攻也禮書之意則是以雜記所言即是衰周變禮其説較王鄭為長陳氏集説即禮書之意也粗衰枕草其非先王所制之士服甚明觀既夕是士禮而云枕塊可知雖孔疏曲為之解曰既夕是廣説是阿鄭意耳難信也又按晏子所服依鄭説則比大夫之服為輕依王説則比當時大夫之服為重禮書用鄭説愚謂此當以王肅之説為正若杜預左傳注直以粗衰斬為斬衰枕草謂與枕塊無二則謬矣有士喪禮則是有大夫喪禮其服制必微有不同不得如陳祥道以雜記之言為周衰變禮也王肅以斂時大夫辨絰士冠素委貌之類當為近是若齊斬之服則不容以貴賤異晏子粗衰枕草當稍重於當時之大夫而已輕於士然亦非先王禮也雜記言自諸侯達諸士小祥之祭主人之酢也嚌之衆賓兄弟則皆啐之大祥主人啐衆賓兄弟皆飲之可也孔疏所以知此酢是受賓長酢者緣士虞禮主人主婦獻尸受酢之時皆卒爵而此唯嚌之故知是賓長酢也陳氏集説亦指賓長言而不言尸酢卒爵則無根據矣尸酢雖喪祭必卒爵尊者賜也賓長酢則或嚌之或啐之不忍飲也雜記親喪外除兄弟之喪內除視君之母與君之妻比之兄弟發諸顔色者亦不飲食也鄭注云言小君服輕亦內除也陳氏集説不承內除説則豈小君兄弟之喪自始至終止發諸顔色者不飲食已乎兄弟之喪雖內除然喪制未終則哀雖已忘而發諸顔色者亦不飲食蓋引而致之也於小君之喪亦然其哀本薄也雜記期之喪十一月而練十三月而祥十五月而禫練則弔鄭注此謂父在為母也集説因之然喪服小記云宗子母在為妻禫又云為父母妻長子禫不知康成何以獨主父在為母言凡杖期則皆十一月而練十三月而祥十五月而禮父在為母夫為妻皆杖期父在則子為其妻不敢杖不杖則不禫若母則雖在而已為宗子則妻為宗婦亦杖而禫池己承祖父後為宗子則為其長子斬齊三年已不承祖父後非宗子則不得為其長子斬齊然亦杖期而禫也興詩立禮只當于詩禮二經求之至成于樂則非精通乎易書春秋者不能成於樂今無樂教故鮮知其效亦非待精通易書春秋之説雜記子貢問喪子曰敬為上哀次之鄭注云喪尚哀言敬為上者疾時尚不能敬也愚謂敬亦從哀生哀之至自能敬不能敬亦是哀淺分而言之則是二事如問喪間傳止説得哀若士喪禮喪大記則庶幾於敬矣所謂附于身附于棺者必誠必信也孔子曰喪以敬為上哀次之蓋哀而忘敬非孝也故朱子於慎終追逺章注不曰喪盡其哀而曰喪盡其禮敬者愛之之至也曽子問取女有吉日而女死如之何孔子曰壻齊衰而弔既葬而除之夫死亦如之觀此則知後世有未婚而守節者非禮明矣女子未婚而守節雖不必先王之禮然守信不渝要亦不可以為非禮衛共薑柏舟之詩其語氣亦似未成婚者子上不喪出母孔疏鄭注及陳氏集説皆引儀禮為出母齊衰杖期而為父後者無服但陳氏則云伯魚子上皆為父後禮當不服而以服者為過孔疏鄭注則云子思既在子上當為出母有服而以不服者為非陳氏説本橫渠張子今從之朱子答林擇之書則又云按喪服傳出母之服期但為父後者無服耳子思此事不可曉兼汙隆之説亦似無交涉或記者之誤歟伯魚子上皆為父後皆不喪出母雲莊從張子之説是也孔鄭謂子思既在子上當為出母有服此説似不然夫子厭於父父在子為母杖期父卒然後為母三年以夫主妻喪止於杖期故父在亦只為母杖期也况父出其母已與之絶而父在敢為出母服乎由此言之子上雖不為父後亦不敢喪其出母也答林擇之書或亦朱子一時未定之説耳孔子殯于五父之衢集説力辨其誣可以正史記及孔鄭之失陳幾亭謂誅少正卯之事左傳不載孟子不言此穰苴孫武行兵立威之法豈聖人為政之道家語不可盡信朱子亦斷其為妄此皆力衛聖道之言孔子少孤不知其父之墓殯于五父之衢蓋非全不知也但以少孤而知之未審此以將合葬其母則審慎之至故更訪問之故下文曰其慎也舊注以慎字為靷字大失記意此似不必辨也若史記則誣矣誅少正卯必非聖人事家語之不足信者尤多也祥禫之月鄭玄王肅之説不同孔疏於孟獻子禫條辨之詳矣集説于此既主鄭説而于下文祥而縞是月禫徙月樂又載馬氏之説却仍是王肅之意前後舛錯朱子文集卷六十三答胡伯量亦云中月而禫鄭注虞禮為是故杜佑亦從此説中月而禫為是祥而縞是月禫是字必誤孔氏禮法之宗也乃伯魚子上之母則出子思之母則嫁皆見于檀弓閨門之內何其多故耶陸翼王集説補正曰按孔子年十九娶宋幵官氏女明年生子適魯昭公賜之二鯉孔子榮君之賜因以名之至六十六而幵官夫人卒則無出妻之事可知聖門禮義之宗豈有三世出妻者其為異學詆毁無疑也孔子之內子幵官氏家語記孔子年十九娶幵官氏明年生伯魚六十六歲幵官氏卒陸氏據此疑檀弓之誣但孔子於魯為士娶妻得有娣姪記言伯魚之母意伯魚或非嫡出也或有過出之亦不足疑耳旅酬之禮見于特牲有司徹鄉射鄉飲酒燕禮者參差不等故語類中庸卷內朱子所解旅酬其説亦不一旅酬之禮儀禮特牲有司徹鄉射鄉飲燕禮皆有之而各不同故朱子中庸章句只概舉為言不專據特牲也又旅酬之初只有一人舉觶至無算爵而後二人舉觶惟儐尸則二人為旅酬始朱子言賓弟子兄弟之子各舉觶于其長者蓋無算爵亦是衆相酬而必兼無算爵言逮賤之意方周到也蒙引解旅酬直是于儀禮不曽考究猶今人解揖讓而升謂是三人為耦三耦進三耦出皆貽笑大方耳舊本儀禮特牲篇賓弟子及兄弟弟子洗各酌于其尊條內脫却舉觶者祭卒觶拜長皆答拜十一字以儀禮經傳及楊氏儀禮圖考之可見蒙引解中庸旅酬之義最為鶻突其曰舉解非就是各勸其長飲也只是洗盞更酌而歸之于其長其長只將此觶往勸他人飲耳絶不及弟子卒觶一節殊非儀禮之意豈其所見之儀禮乃舊本之脫落者耶酬導飲也凡自飲以勸人飲則曰酬故凡飲酒之禮主人酌賓曰獻賓飲主人曰酢主人又酌自飲而復酌以飲賓曰酬賓受酬奠而不舉以待旅也蒙引謂賓既飲仍以酢主人主人又飲此一謬也至弟子舉觶則賓弟子及兄弟弟子皆洗酌堂下北面祭卒觶拜其長皆答拜然後洗更酌以奠於其長此弟子之導長飲也蒙引謂舉觶非就是各勸其長飲只是更酌而歸于其長其長只將此觶往勸他人飲耳不及弟子卒觶一節夫不先卒觶則非導飲矣此二謬也及旅酬則賓舉所奠之觶以酬兄弟兄弟之長亦舉弟子所奠之觶以酬賓交相導飲故曰旅酬蒙引謂長非一二人弟子亦非止一二人此與儀禮一人舉觶二人舉觶之言正相背此三謬也禮儀甚煩而不一學者當考全經姑述其略如此少牢用薦歲事于皇祖伯某某字也注疏引左傳諸侯以字為諡因以為族則某又或是諡也其解與杜注不同杜注是言或以字為氏或以諡為氏故將諸侯以孚四字為句儀禮注疏是言大夫或因字為諡故將諸侯以字為諡六字為句左傳之解自當以杜氏為正若依鄭解則公子展先以展為諡而後命以為氏其説未知何據左傳以字為諡諡字當是氏字之誤古人言禮不能處處皆詳因其詳處推到略處則彼此皆明如少牢云司宫設罍水于洗東有枓鄭注設水用罍沃盥用枓禮在此也疏云言禮在此者以士冠禮直言水在洗東士昏禮亦直言水在洗東鄉飲酒特牲記亦云然皆不言罍器亦不云有枓其燕禮大射雖云罍水又不言有枓故鄭云凡此等設水用罍沃盥用枓其禮具在此又少牢云上利升羊載右胖髀不升肩臂臑膊骼正脊一脡脊一橫脊一短脅一正脅一代脅一背二骨以並腸三胃三長皆及俎拒舉肺一長終肺祭肺三皆切肩臂臑膊骼在兩端脊脅肺肩在上鄭注云凡牲體之數及載備于此疏云前體肩臂臑兩相為六後體膊骼兩相為四短脅正脅代脅兩相為六脊有三總為十九體惟不數觳二通之為二十一體二觳正祭不薦于神尸故不言是牲體之數備于此此皆因其詳而知其略可悟解經之法載右胖於俎肩臂臑在俎之上端膊骼在下端此俎之兩頭也脊脅肺肩在上此橫置俎中以脊為上也腸三胃三長皆及俎拒其長如俎之廣也舉肺一此尸所舉之肺不切而長終肺也此亦橫置祭肺三皆切此尸舉以祭之肺故切之而不殊少儀所謂離而不提心也古人位置一物必端詳如此吾鄉昔時禮席用雞則置首于前置兩翼于前之左右置兩股于後之左右置尾于後置脊于中又加腹肉及肫腸等于上位置不苟殊有古意俗謂之排四正數十年來此意亦亡則徒以餔啜醉飽為快矣亦俗之日偷也少牢四人𧃊疏云上佐食東面近南下佐食西面近北注云一賓長在上佐食之北一賓長在下佐食之南楊氏圖因之然佐食與佐食賓長與賓長所以不得東西相當之故注疏皆無確據疏雖云以其尸東面近南今尸起上佐食居尸坐處明知位次如此然上佐食固當東面近南矣下佐食何以不得西面近南乎少牢四人𧃊上佐食東面近南下佐食西面近此注云一賓長在上佐食之北一賓長在下佐食之南蓋室中尚西故上佐食上賓東鄉下佐食次賓西鄉室中尚右故佐食處右賓處左佐食介於尸尊佐食猶尊尸也東鄉則右在南西鄉則右在北有司徹疏云蕡麻有實枲麻無實鄭云蕡枲實者舉其類耳若竹器圓曰簞方曰笥鄭注論語亦云簞笥亦是舉其類也又疏曰有骨為臡無骨曰醢昌菹醢者即周禮麋臡臡散文亦名醢此皆是注疏活法若不知此活法則窒礙者多矣疏內用字如同時則云俱時之類則云之等如此字法今人罕用見有司徹主婦薦豆籩條又據彼決此疏內往往單用一決字如有司徹賓長獻尸條云不使兄弟不稱加爵大夫尊也者此決特牲云長兄弟為加爵又衆賓長為加爵不言獻醢肉醬醓醢多汁者臡醢帶骨者菹醃菜古人統謂之醢又醯醢梅鹽亦統謂之醢祭法有虞氏禘黃帝而郊嚳祖顓頊而宗堯國語有虞氏禘黃帝而祖顓頊郊堯而宗舜韋昭注云舜在時則宗堯舜崩而子孫宗舜説兩邊不同處最明陳澔集説取國語此條置祭法之下而不載韋氏之注豈不滋學者之惑禘郊祖宗之禮祭法國語俱難據信萬物本乎天人本乎祖故祀天必以祖之德可配天者配之以己之精神未必能感格於天故藉己之祖血脈一貫以庶幾可通於天所謂介紹之義也非其祖則血脈先已不相貫矣舜之先難以考所自出史記世本説皆近誣而嚳則必非舜之祖矣祭法謂郊嚳宗堯國語謂郊堯皆未必然韋昭謂舜在時宗堯舜崩而子孫宗舜此亦未敢據也又言夏后氏郊鯀夫尊祖配天此雖子孫之志亦必顧其祖德何如鯀豈可以配天者哉在舜方殛之而夏乃以之配天天其必不享也惟禮運言杞之郊也禹也宋之郊也契也此為得之由此推之則舜之子孫苟得郊祀其必當以舜在舜禹之時則或郊以顓頊可矣韋昭國語注祖文王而宗武王與孝經異者周初亦祖后稷而宗文王其後更祖文王而宗武王此則似將宗字看作宗祀明堂之宗與集説劉氏注不同劉注是也劉氏欲改正經文之處亦皆有理若鄭康成云有虞氏夏后氏宜郊顓頊殷人宜郊契郊祭一帝而明堂祭五帝小德配寡大德配衆亦禮之殺也此則因鄭康成看禘郊祖宗先差故此等説皆不足據祖是别子為祖繼别為宗凡始封之君必其有功而受封則其後子孫祖之及後世有有德能紹其祖而益光其業者則又尊之曰宗如殷三宗周文武其廟亦百世不遷是也何必每朝定有一祖一宗如祭法國語之謂若周人宗祀文王於明堂以配上帝則此宗字只當尊崇之義看并與祖宗宗字無涉韋昭謂周初亦祖后稷而宗文王其後乃祖文王而宗武王然則其後乃宗祀武王於明堂矣何附會無意義乎禘郊祖宗鄭注云禘謂祭昊天于圜丘也祭上帝于南郊曰郊祭五帝五神于明堂曰祖宗祖宗通言耳又郊特牲疏云九月大饗五帝則以五人帝及文武配之以文王配五天帝則謂之祖以武王配五人帝則謂之宗此亦主鄭説王肅則言禘黃帝是宗廟五年祭之名又言郊與圜丘是一郊即圜丘郊非祭感生之帝又以祖宗為祖有功宗有德其廟不毁非宗祀明堂之宗陳氏集説皆主王肅而不主康成最是圜丘即南郊也上帝即昊天也朱子曰祀於郊野以神事之則曰天祀於明堂屋中以人禮享之則曰帝此最分明鄭氏分邱郊天帝而二之疏又有以文王配五天帝以武王配五人帝之説此最為紕謬五帝當如月令之説以迎春迎夏迎秋冬於郊而祭之配以句芒等五神而已祭法篇首疏云春秋命歷序炎帝號曰大庭氏傳八世合五百二十歲黃帝一曰帝軒轅傳十世二千五百二十歲次曰帝宣曰少昊一曰金天氏即窮桑氏傳八世五百歲次曰顓頊即髙陽氏傳二十世三百五十歲次是帝嚳即髙辛氏傳十世四百歲此鄭之所據也其大戴禮少典産軒轅是為黃帝黃帝産玄囂玄囂産喬極喬極産髙辛是為帝嚳帝嚳産放勳是為帝堯黃帝産昌意昌意産髙陽是為帝顓頊顓頊産窮蟬窮蟬産敬康敬康産句芒句芒産蟜牛蟜牛産瞽瞍瞽瞍産重華是為帝舜及産象傲又顓頊産鯀鯀産文命是為禹司馬為史記依此而用焉皆鄭所不取又疏載張融之説云若依大戴禮及史記稷契及堯俱帝嚳之子堯有賢弟七十不用須舜舉之此不然明矣又孔子刪書求史記得黃帝玄孫帝魁之書若五帝當身相傳何得有玄孫帝魁愚按此等處皆難臆斷傳疑可也大司樂享先妣賈疏曰毛君與史記同以薑嫄帝嚳配鄭君依命歷序帝嚳傳十世至堯后稷為堯官則薑嫄為帝嚳後世妃命歷序炎帝八世黃帝十世少昊八世顓頊二十世帝嚳十世此雖逺無可稽要之近是大戴禮以堯舜稷唐禹臯陶伯益同出黃帝之後此其世次逺近不等而大統屢易昏配紊瀆此必非也稷為帝嚳之後薑嫄蓋帝嚳子孫之妃稷契與堯必非同父蓋髙辛後世别子于堯為叔父行矣祭法疏云聖證論王肅六宗之説用家語之文以此四時也寒暑也日也月也星也水旱也為六宗孔注尚書亦同之伏生馬融以天地四時為六宗劉歆以乾坤之子六為六宗賈逵云天宗三日月星也地宗三河海岱也日月為隂陽宗北辰為星宗河為水宗海為澤宗岱為山宗鄭駿之云書云類于上帝禋于六宗望于山川山川言望則六宗無山川明矣大宗伯云以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命風師雨師郊特牲日郊之祭也大報天而主日又祭義曰郊之祭大報天而主日配以月則郊天並祭日月可知其餘星也辰也司中也司命也風師也雨師也此之謂六宗愚按鄭氏之駁諸説固未可盡據今蔡氏書傳陳氏禮記集説既主王肅而不主鄭氏則相近于坎壇一句宜依王氏讀作祖迎不宜依鄭氏讀作禳祈書經大全讀作禳祈非也蓋鄭氏因周禮大宗伯備列諸祀而不見祭四時寒暑水旱故以祭法所載為遇災禳祈之禮非關正禮而不用以解舜典故相近讀為禳祈雩宗幽宗之宗皆謂是禜字之誤蔡氏書傳引祭法不用此解也六宗之説定主王肅相近二字斷為祖迎周禮大宗伯章諸祀略舉其重亦不必無所遺不必疑四時寒暑水旱之不見載也月令大雩帝用盛樂何必遇水旱而後禳祈之且飌伯雨師豈非水旱之事祭法廟制鄭氏注云鬼亦在祧顧逺之于無事祫乃祭之耳春秋文二年秋大事于太廟傳曰毁廟之主陳于太祖未毁廟之主皆升合食于太祖是也魯煬公者伯禽之子也至昭公定公久已為鬼而季氏禱之而立其宫則鬼之主在祧明矣此一段補經文所未及最好陳氏集説直以經文為失則過矣謂鬼之主亦在祧可矣然為壇為墠又何説焉廟制朱子然劉歆之説而康成注王制祭法則皆以文武處七廟之內此則不可從周禮守祧疏曰孔君王肅之義二祧乃是髙祖之父髙祖之祖與親廟四皆次第而遷文武為祖宗不毁矣鄭不然者以其守祧有奄八人守七廟并薑嫄廟則足矣若益二祧則十廟奄八人何以配之愚按鄭説固非無據然奄八人此特周公時事耳安知後來不增作十人乎廟數朱子取劉歆之説二祧在七廟數外鄭氏守祭法之説以周禮守祧奄八人守七廟并薑嫄廟若益二祧則十廟八人何以配之抑知周公時文武只在七廟之內至懿王始立文世室至孝王始立武世室故周禮只守祧八人若懿孝時廟增而九則守祧之何不可增而十乎祭法鄭注云惟天子諸侯有主禘祫大夫有祖考者亦鬼其百世不禘祫無主爾疏云王制天子諸侯有禘祫故知有主王制大夫三廟一昭一穆與太祖而三太祖只是大夫之祖考既有祖考明應遷之祖以制幣招其神而藏焉故云亦鬼其百世若無祖考祇得立曽祖與祖及父二廟而已則不得鬼百世也云不禘祫無主爾者惟有百世之鬼不得禘祫無主爾左傳衛大夫孔悝有主者祭其所出之君為之主耳愚按此則古禮大夫有廟無主今家禮士大夫皆得有主者蓋以義起之也鄭氏謂大夫士有廟無主此亦未必然鄭注祭法七祀五祀條云此小神居人之間司察小過作譴告者爾故孔疏解司命云司命者宫中小神熊氏云非天之司命故祭于宫中皇氏云司命者文昌宫星其義非也愚按注疏此等解最精可見百神之散列于天地間大小相維上下相制至嚴至密陳氏集説謂司命見周禮似誤認祭法之司命作周禮之司命祭法七祀五祀三祀一祀之説亦難據信五祀據左氏則句芒祝融后土蓐收玄冥也據祭法則戶竈中霤門行也而月令則兼有之愚按句芒五者古之貴神非士庶所當祀亦非戶竈等神所可當也至如戶竈五者則所職卑小民庶皆日用習之則士庶宜皆得祭之又不當只祭其一或祀戶或祀竈也司命則天之貴神宜益崇於句芒五者鄭氏不安故謂此小神居人之間司察小過作譴告者耳孔疏熊氏皆用其説然愚謂神之格思不可度思矧可射思塞滿天地固無非鬼神但謂實有神焉居人間司察小過則似看鬼神有心又似兩間鬼神亦有分司統屬如官府號令胥徒稽察焉則密而反疏且啓後世之禱媚矣然祭法所謂司命固必不可以天之司命當之也又由此而推則句龍配社大夫以下成羣立社不得皆以句龍配之也戶雖配木而士庶祭戶非句芒竈雖配火而士庶祀竈非祝融也天地間物有其妙用則有其神焉賴其利用則報以祀焉顧分惟其稱耳泰厲國厲自宜有祭使鬼有所依漢時以厲為山鄭固以為謬矣祭義禘有樂而嘗無樂孔疏謂周禮四時之祭皆有樂殷則蒸嘗之祭亦有樂故那詩云庸鼓有斁萬舞有奕下云顧豫蒸嘗則殷秋冬亦有樂者熊氏云殷秋冬但有管絃之樂愚按此等處不若集説闕疑為是享禘依舊説作礿有樂食嘗無樂此於禮終不合祭義出戶而聽愾然必有聞乎其歎息之聲鄭注謂無尸者闔戶若食間則有出戶而聽之皇氏謂尸謖之後陽厭之時愚按此二説似可兼用蓋有尸無尸皆有出戶而聽之時也集説于此略而不注則與上文周旋出戶無分别矣孝子臨尸而不怍鄭注色不和曰怍怍字無注則與愧怍之怍無别矣鄭解似精無尸曰厭祭尸謖之後陽厭於室之白此時亦無尸臨尸不怍既無愧鬼神之義即孝子能饗親之義惟聖人為能饗帝孝子為能饗親鄭注云謂祭之能使之饗也此注最精蓋饗不饗帝親主之而我能使之必饗此即中庸大德者必受命之意集説略而不注疏矣聖孝是平時事饗帝饗親是祭時事能字則從平時通之於祭時惟德與天合精神與天無間然後能於祭時致天神之饗孝不忘先精神與祖無間然後能於祭時致祖宗之饗不然則不仁不孝自絶於天親久矣安能於俎豆間一邀天親之饗乎盡其慤而慤焉盡其信而信焉盡其敬而敬焉疏云盡慤謂心盡其慤也而慤焉謂外亦慤焉其信與敬皆處內內有其心外著于貌此疏解得甚精不知集説何以不用盡其慤言致其慤也是用力語而慤焉無不慤也是盡頭語信敬亦然至孝近乎王至弟近乎霸言其所及之有逺近耳注疏皆不明白至孝近乎王王家天下自有似孝處至弟近乎霸霸長諸侯自有近弟處文王為西伯亦是霸不必泥孟子王霸之説駁之孔疏謂郊之祭大報天而主日配以月蓋天帝獨為壇其日月及天神等共為一壇故日德為衆神之主也又云祭日于壇謂春分也祭月于坎謂秋分也而崔氏還據上文郊祭之時非也愚按集説于此並不言是春秋分是亦同崔氏之説也當從孔疏為是但孔疏謂郊是夏正郊祀則因康成之誤耳郊之祭迎長日之至也此即主於日之意猶社言祭土而主隂氣也蓋大報天而又以日為天神之主則其義迂矣且祭土又豈有個隂氣為主乎愚謂郊天只宜是祭天而配以稷以稷者介紹之義耳用犢以著其誠致其專一以格於天不當遍祀天神以分其誠敬也因主日之言而加出配以月蓋失之矣日月之祀自在春秋分也鬼神之名合祭義疏及左傳子産對趙簡子疏觀之然後明白祭義云氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也鄭注云氣謂噓吸出入者也耳目之聰明為魄疏云氣謂噓吸出入者也謂氣在口噓吸出入此氣之體無性識也但性識因此氣而生有氣則有識無氣則無識則識從氣生性則神出入也故人之精靈而謂之神云耳目之聰明為魄者魄體也若無耳目形體不得為聰明故云耳目聰明為魄又云鬼神本是人與物之魂魄若直名魂魄其名不尊故尊而名之為鬼神對則精靈為魂形體為魄故昭七年左傳云人生始化曰魄既生魄陽曰魂是形為魄氣為魂若散而言之魄亦性識識與魄無異故昭二十五年左傳云心之精爽是為魂魄魂魄去之何以能久又襄二十九年左傳云天奪伯有魂又對而言之天曰神地曰祇人曰鬼散而言之通曰鬼神此皆祭義疏也左傳疏云人稟五常以生感隂陽以靈有身體之質名之曰形有噓吸之動謂之為氣形氣合而為用知力以此而強故得成為人也人之生也始變化為形形之靈者名之曰魄也既生魄矣魄內而有陽氣氣之神者名之曰魂也魂魄神靈之名本從形氣而有形氣既殊魂魄亦異附形之靈為魄附氣之神為魂也附形之靈者謂初生之時耳目心識手足運動啼呼為聲此則魄之靈也附氣之神者謂精神性識漸有所知此則附氣之神也是魄在于前而魂在于後故云既生魄陽曰魂魂魄雖俱是性靈但魄識少而魂識多鄭氏祭義注云氣謂噓吸出入者也耳目之聰明為魄是言魄附形而魂附氣也人之生也魄盛魂強及其死也形消氣滅郊特牲曰魂氣歸于天形魄歸于地以魂本附氣氣必上浮故言魂氣歸于天魄本歸形形既入土故言形魄歸于地聖王緣生事死制其祭祀存亡既異别為作名改生之魂曰神改生之魄曰鬼劉炫曰人之受生形必有氣氣形相合義無先後而此云始化曰魄陽曰魂是則先形而後氣先魄而後魂魂魄之生有先後者以形有質而氣無質尋形以知氣故先魄而後魂其實並生無先後也此皆左傳疏也陳氏集説于祭義宰我問鬼神條引中庸章句程張朱子之説不知中庸是泛言鬼神不專指祭祀之鬼神與祭義所説不同一隂一陽兩在不測合之則循環無端分之則至於無可分天地間只是這個妙以人言則男陽女隂而男女又各有魂魄魂氣為陽體魄為隂以時言則春夏為陽秋冬為隂而春夏秋冬又各有晝夜也晝夜晝陽夜隂晝夜十二時又子陽丑隂寅陽卯隂是分之至無可分也而天之生物成物以此人之動作云為以此豈非天地之功用天道無形迹可尋而祇此則有可據故曰造化之迹時一春夏便自能生長時一秋冬便自能收藏人有體魄則自能視聽聰明有魂氣則自能呼吸運動有視聽則自有哲謀之德有言動則自有肅乂之常食味别聲被色種種知識靈妙皆其自然而具豈非二氣之良能乃此有分有合合晝夜而成春夏秋冬合魂魄而成人物魂魄合撰日來而伸自受形父母以至於強壯又皆可謂之神如時之春夏也四十五十以後形氣日衰精神亦日減以至於魂離魄墮又皆可謂之鬼如時之秋冬也及夫骨肉瘞於下其氣發揚於上有如昭明焄蒿悽愴者則靈氣之餘有所未盡猶有足以感人而天地之氣即人之氣子孫之精神魂魄即祖考之精神魂魄故因其昭明焄蒿悽愴之足以感人而萃人之精神意志以感之為求諸隂為求諸陽則洋洋乎如在其上如在其左右矣魂遊魄墮鬼之歸也及乎洋洋如在則又有來而伸者矣是故分而言之則鬼者隂之靈也魄者鬼之盛也神者陽之靈也氣者神之盛也合而言之則方至而伸雖魄亦統於神其散而歸則魂亦歸於鬼故曰物之終始莫非隂陽合散之所為此合二氣一氣兩義而言之也終鬼始神隂鬼陽神隂陽之合為神隂陽之散為鬼天地鬼神莫非實理一隂一陽之謂道天地以二氣生人生物而此理即寓其中故形氣魂魄之身靈妙無端而仁孝慈愛恭敬之良亦動於中而不能自已隨感而發各有當然之則是則天道之至教也聖人修道之教修此而已是以云為合理則此心快然而四體適安云為不合於理則此心歉然而如有所畏是則鬼神之監無所不在而其感人之切能使人惻然動其天性惕然反躬自省者則莫如此昭明焄蒿悽愴之會故以此為尤神之著因其感人之切而制為之極則且明即此而指言之曰鬼神如制為喪祭之禮使人率而行之以永其慎終追逺之良報本反始之意則仁孝慈愛恭敬之情油然日生以至於手舞足蹈而不自知而百官不以治萬民不以服乎故宰我問鬼神一章實與中庸鬼神之為德一章相為表裏天地之鬼神即祭祀之鬼神原非有二即鬼神之為德章亦未嘗不言祭祀也稼書先生譏雲莊於宰我問鬼神章不當引用程張朱子之説謂中庸是泛言之鬼神與祭義所説不同其亦有所未達矣敬可能也安為難集説云安為難者謂非勉強矯拂之敬也孔疏云使父母安樂為難也尤妙敬可能也安為難集説云謂非勉強矯拂之敬也孔疏云使父母安樂為難愚謂子敬而出於安則父母安之矣祭統云知足以利之集説謂利己之得次名于下也此本孔疏悖義特甚大全葉氏以不誣其實為利之勝舊説多矣又銘者自名也注疏集説皆解得不妥愚謂是欲效法先祖以自成名之意故下文云身比焉順也銘者自名也稼書先生謂是欲效法先祖以自成名之意此解甚好郊特牲疏云王肅以郊丘是一而鄭氏以為二者按大宗伯云蒼璧禮天典瑞又云四圭有邸以祀天是玉不同宗伯又云牲幣各放其器之色則牲用蒼也祭法又云燔柴于泰壇用騂犢是牲不同也又大司樂云凡樂圜鐘為宫黃鍾為角大簇為徵姑洗為羽冬日至於地上之圜丘奏之若樂六變則天神皆降上文云乃奏黃鍾歌大吕舞雲門以祀天神是樂不同也故鄭以蒼璧蒼犢圜鐘之等為祭圜丘所用以四圭有邸騂犢及奏黃鍾之等以為祭五帝及郊天所用愚按鄭氏郊丘之説固不可從然未知此等處王肅以何義駁之當考古人有瑞玉以為贄者有享玉以為禮者如桓信躬榖蒲所執以朝聘也又有瑑圭璋璧琮琥璜所將幣以享獻也蓋於神亦然大宗伯蒼璧禮天黃琮禮地及牲幣各放其器之色此所以將幣為禮者猶享玉也四圭有邸以祀天兩圭有邸以祀地此所執見為贄者猶瑞玉也大司樂章奏黃鍾歌大吕舞雲門以祀天神此蓋正祭時所歌舞以樂神者猶鄉飲酒禮於獻酬皆畢之後乃以樂樂賓也圜鐘為宫黃鍾為角太簇為徵姑洗為羽冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮此蓋未祭之先作樂以感神者所謂臭味未形蕩滌其聲也康成以蒼璧蒼犢圜鐘之等為祭圜丘所用以四圭有邸及騂犢及奏黃鍾之等為祭五帝及郊天所用鄭氏以圜丘為禘以祭上帝于南郊曰郊祭五帝五神于明堂曰祖宗故其説如此謬耳燔柴於泰壇用騂犢郊圜丘也其有用蒼如郊禖祈榖之郊也少牢特牲士大夫之祭皆無樂然左傳衆仲論羽數曰天子八諸侯六大夫四士二未詳其故諸侯用鬱鬯用樂且待天子之賜則大夫士之祭得用樂必待君賜可知矣雖受君賜亦不得過四佾二佾也少牢饋食特牲禮皆無樂其常也郊特牲疏云郊與配坐皆特牲故下文云養牲必養二帝牛不吉以為稷牛又召誥云用牲於郊牛二是也然祭天初有燔燎後有正祭皆須有牲故大宗伯云實柴日月星辰鄭司農云實牛柴上也鄭康成云實牲體焉郊唯特牲得供燔燎正祭二處所用者熊氏皇氏等以為分牲體供二處所用其實一特牲也而月令郊禖用大牢者彼是求子之祭不與常祭同我將祀文王于明堂經云維羊維牛者據文武配祭得用太牢也愚按此等處全賴注疏不然則郊特牲與召誥我將皆矛盾矣燔燎未必用全牲或首用以燔柴分牲體以供獻耳然郊之胙曰膰是所燔之餘也或其俎皆燔熟之非如宗廟之烹也惟郊圜丘及祈榖等用特犢髙禖宗祀則太牢也又疏云諸侯不敢祖天子而文三年左傳云宋祖帝乙鄭祖厲王大夫不敢祖諸侯而莊二十八年左傳云凡邑有宗廟先君之主曰都與此文不同者此據尋常諸侯大夫彼據有大功德者非注疏此等處便難解矣諸侯不敢祖天子大夫不敢祖諸侯支子不祭皆禮之正此禮行而定分秩然矣宋祖帝乙鄭祖厲王邑有先君之廟皆春秋時之失禮歟然魯有周廟文王廟而太廟仍祖周公則是宋或立帝乙之廟而祖仍自微子鄭或立厲王之廟而祖仍自桓公耳郊特牲疏云社稷之義先儒所解不同鄭康成之説以社為五土總神稷為原隰之神句龍以有平正水土之功配社祀之稷有播種之功配稷祀之若賈逵馬融王肅之徒以社祭句龍稷祭后稷皆人鬼也非地神故聖證論王肅難鄭云召誥用牲于郊牛二明后稷配天故知二牲也又云社于新邑牛一羊一豕一明知惟祭句龍更無配祭之人為鄭學者通之云是后稷與天尊卑既别不敢同天牲句龍是土公之神社是地祇之别尊卑不甚懸絶故云配同牲也愚按此當依疏主鄭氏説大祝言后土鄭注后土社神也賈疏曰句龍生為后土之官死則配社故舉配食人神以言社其實告社神也社土神稷榖神本自分明榖别於土者猶榖之並五行為六府也五土皆統於社五土者邱陵山林原隰墳衍川澤也百榖統之以稷康成分原隰之神為稷非也祭社配以句龍祭稷配以柱棄此亦介紹之義由先正治其事者以通於其神也王肅直以為社祭句龍稷祭后稷則是不曽祭土榖矣且句龍亦貴神而置社通於士庶豈可以士庶之賤而享句龍乎知以句龍后稷配者惟天子諸侯然也韓子云鄉之賢者沒而祭於社是亦配食之義人神配而同牲則尊卑不甚懸絶之故郊特牲云郊之用辛也周之始郊日以至孔疏云王肅用董仲舒劉向之説以此為周郊上文云郊之祭迎長日之至謂周之郊祭于建子之月而迎此冬至長日之至也而用辛者以冬至陽氣新用事故用辛也周之始郊日以至者對建寅之月又祈榖郊祭此言始者對建寅為始也鄭康成則異于王肅上文云迎長日之至自據周郊此云郊之用辛據魯禮也言郊用辛者取齊戒自新周之始郊日以至者謂魯之始郊日以冬至之月云始者對建寅之月天子郊祭魯于冬至之月初始郊祭示先有事故云始也愚按康成于郊之祭也迎長日之至也則云三王之郊一用夏正夏正建寅之月也此言迎長日者建卯而晝夜分分而日長也于郊之用辛也周之始郊日以至則云周衰禮廢儒者見周禮盡在魯因推魯禮以言周事所解與王肅絶異朱子于此則從王肅善哉集説之言曰郊祀一節先儒之論不一者有子月寅月之異有周禮魯禮之分又以郊與圜丘為二事又有祭天與祈榖為二郊今皆不復詳辨而與朱説為是郊之用辛也周之始郊日以至據記文當是云周始有天下而行圜丘郊禮時適以辛日冬至故其後遂沿以辛日郊祀耳王肅以始郊為子月圜丘之郊對寅月祈榖之郊言故曰始而以用辛者為陽新用事之義此自可通但春秋記魯郊亦皆用辛日故康成以迎長日之至為周郊以用辛為據魯郊言以迎長日之至為建寅之月月建卯而晝夜分分而日長故寅月迎之也魯郊以冬至之月示先有事也郊之用辛也周之始郊日以至周衰禮廢儒者見周禮盡在魯因推魯禮以言周事也鄭以圜丘為禘以寅月之郊為郊故其説如此愚按春秋書魯郊多在四月建卯之月後時也左傳云啓蟄而郊古人以驚蟄為正月中雨水為二月節至後世乃兩易之又曰郊以祈農事未見有書春王正月郊者惟宣公三年正月郊牛之口傷此牛口之傷在子月非郊在子月也然則魯有寅月祈榖之郊無日至圜丘之郊杜預之説為是矣公榖説經其事迹固多不足據也蓋郊祭非一有日至圜丘之郊有孟春祈榖之郊此皆配以后稷有四時迎氣之郊此在迎春配以太皥牲玉用蒼迎夏配以炎帝牲玉用赤并中央土配以黃帝牲玉用黃迎秋配以少皥牲玉用白迎冬配以顓頊牲玉用黑也有髙禖求子之郊以玄鳥至之日牲用太牢配以先媒蓋亦太皥也有龍見而雩之郊此用盛樂魯亦行之其配蓋亦以炎帝也又季秋宗祀饗上帝用太牢此於明堂屋下不得言郊此皆與皇氏崔氏之説略同而立義稍異外此則天子將出而類於上帝亦以郊禮行之故謂之類巡守則柴於四嶽之上禮器所謂因名山升中於天者也是皆有事於天特非歲遍之常祀耳仇滄柱云圜丘即南郊王肅已言之方丘即社則未有知之者鄭氏謂地神有二夏至日祭崑崙之神于方澤曰禘夏正祭神州地祇于北郊曰郊而社為五土之神稷為原隰之神其祭也配以句龍后稷其説固支離不經王肅雖并北郊方澤為一然以社稷之祭為句龍后稷皆人鬼非地祇則猶是岐社與方丘而二之也又取萬充宗之説謂社有二大社以祭率土之地祇王社以祭畿內之土榖大社即北郊愚按仇萬二子之言蓋即朱子所取五峰胡氏無北郊之説社有大社王社舊説謂大社為庫門右之社以王社為藉田中之社惟萬充宗以大社為北郊方澤之社與圜丘對者夏至祭之所以主率土之地祇也王社為庫門右之社此與稷並者所以祭畿內之土榖也此立義最精宜不可易康成謂地神有二夏日至祭崑崙之神於方澤曰禘夏至祭神州地祇於北郊曰郊此説今人多知其非然中庸以社對郊言終不知為何社也朱子取胡五峰無北郊之説鄉頗疑之抑知大社即北郊方澤五峰所言只有社無北郊者以鄭説言謂無夏正寅月祭神州於北郊之禮耳非謂夏至不祭地祇於北郊方澤也萬氏於二社説為得之於禘祫又説得混亂郊特牲于蠟祭之後曰黃衣黃冠而祭息田夫也鄭注云祭謂既蠟臘先祖五祀也於是勞農以休息之孔疏云對文蠟臘有别總言俱名蠟也故月令孟冬祈來年于天宗大割祠于公社及門閭臘先祖五社鄭注云此周禮所謂蠟是也又云但不知臘與蠟祭相去幾日唯隋禮及今禮皆蠟之後日陳氏集説止引月令臘先祖五祀之文而不言在既蠟之後使讀者不知蠟之與臘是一是二殊欠分曉八蠟鄭注云先嗇一也司嗇二也農三也郵表畷四也貓虎五也坊六也水庸七也昆蟲八也孔疏云王肅分貓虎為二無昆蟲鄭數昆蟲合貓虎者昆蟲不為物害亦是其功愚按以經文考之似王説為優陳氏禮書合貓虎者去昆蟲而以百種為八蠟之一此武斷也沙隨程氏從鄭説而曰非祀昆蟲祀夫能去昆蟲者也得之庚午年十二月偶閲明人雜文識祭蠟皮辨素服榛杖以送萬物之終息民之祭黃衣黃冠而祭以息農夫大蠟有八息民之祭祭先祖五祀即月令所謂臘此二祭甚明臘在蠟後也八蠟之目鄭注先嗇一司嗇二農三郵表畷四貓虎五坊六水庸七昆蟲八孔疏云王肅分貓虎為二無昆蟲鄭數昆蟲不為物害亦其功也陳祥道禮書又合貓虎而去昆蟲加以百種程沙隨從鄭説而云非祀昆蟲祀其去昆蟲者愚以記之本文按之云蠟之祭也主先嗇而祭司嗇也其文意與郊之祭大報天而主日也社祭土而主隂氣也語意略同但文有倒順耳是言郊報天而主於迎長日之至社祭土而主於隂氣之方蠟祭司嗇而主於報先嗇教稼之功也然則先嗇司嗇非有二也以司嗇者即先古教稼嗇之人耳不言神農后稷以蠟通於鄉黨則不得干神農后稷也農即其地先世之為田畯賢而有功者此又降於司嗇矣記明言祭百種以報嗇也則百種居八蠟之一明矣而稼書先生謂陳氏武斷何哉貓虎二物安得合之為一昆蟲自非所祭孔疏及沙隨皆曲説耳記文曰土反其宅水歸其壑昆蟲毋作草木歸其澤此祝辭及之耳若祭昆蟲則豈亦祭草木歟記文固並未言祭昆蟲也愚竊以八蠟之目司嗇一百種二農三郵表畷四貓五虎六坊七水庸八也朱子答劉平甫云古禮廟無二主嘗原其意以為祖考之精神既散欲其萃聚于此故不可以二今有祠版又有影是有二主矣恐精神分散非鬼神所安愚按此恐未是古人所謂于彼乎于此乎似不妨有祠版復有影也蓋未知祖考之精神萃于何處而兼設之于義無傷未可以二主之例懲之也廟無二主原死者之神不可使之不凝一也于彼于此以生者之心不敢定祖考之神果安在也二義不同有祠版又有影堂究竟未是董叔重問曰服父母之喪而祭祀祖先當衣何服與居母喪而見父居父母喪而見祖父母其朔旦歲節上壽為禮各依何服父母在而遭所生喪不知合依何服合與不合設几筵出聲哭舅姑俱存而子婦丁其父母憂雖合奔喪然卒哭後必當復歸恐三年之服自不可改遇節序變遷不審可以發哀出聲否見舅姑及從舅姑以祭不知所易當何服朱子答云古者居喪三年不祭見曽子問其見祖父母之屬古人亦有節文不盡記然上壽之禮自不合與所生母喪禮律亦有明文更宜詳考亦當稍避尊者乃為安耳如女以適人為父母服期禮律亦甚明若有舅姑難以發哀于其側從祭但略去華盛之服可也愚按禮雖云不可奪喪而亦當稍避尊者最有折衷服有恩有義君子不可奪喪恩重於義也亦有有所厭而不得終喪者義重於恩也有服而於尊者之前不得不稍避忌亦厭之類也心則惟其自盡耳謂厭於尊而肆然怡然以奪喪為幸則非人也萬正淳問朱子曰謝氏説致生之故其鬼神致死之故其鬼不神何也人以為神則神人以為不神則不神矣按夫子致生致死之説本為明器發也以致死之為不仁故必有是明器以致生之為不智故為是明器而不可用故曰神明之也謝氏之意則與此不同矣又其説主乎致生故謂人以為神則神如此則所謂鬼神者其有無專係乎人心而已無乃似流于作用是性之失乎又曰以為有亦不可以為無亦不可這裏有妙理又曰自家要有便有要無便無皆是此意朱子答曰記得論語説中似有當生者使人致生之當死者使人致死之此却有理愚按謝氏論語説所謂當生者指當格之鬼神言所謂當死者指當逺之鬼神言格之斯有逺之斯無鬼神之有無其源在人仁人孝子之于祭祀何不盡其誠乎人以為神則神人以為不神則不神自家要有便有要無便無上蔡此等語終太落空惟祖考精神便是自家精神此語郤甚好鬼神雖屬氣而鬼神之所以為鬼神則究竟是理人之仁孝誠敬之心未嘗盡泯則雨露既濡必有悽愴之心霜露既降必不能無怵惕惻隱之心身為祖考之身則必有報本之念生備百物之享則必有報功之情是以祭祀之修皆人心之所不能自已意念所接自與發揚為昭明焄蒿悽愴之餘相觸而感通焉是即此心之不能自已處即鬼神之使之也又人心有不慊處如讎怨深結在己問心恆惴惴於彼則氣焰所召彼之神氣亦即此凝而不散况死非其天鬱志未伸其生氣亦未盡則雖死而志結氣凝愈加消散難盡而已心之畏彼者又有以召之是以彭生之豕伯有之戈或觸於胸或嘯於梁亦時有之不足異矣不能謂自家要無便無也要之氣無所附則遊散者不能久存時有發揚終歸散耳故人之祭其先雖至尊亦止七廟而已祭祀之萃渙全在子孫之誠敬所通使之凝聚在此故不忍一日離不忍使其親一日未有所歸惟恐無以萃之則其神氣將遊散而已不得復致其情也若非己族類則其情必不如是之切此則所謂人之氣傳于子孫猶木之氣傳于果實果實之傳不泯其生木雖枯朽而氣之在此者猶自若以果實之氣自凝得所以生之氣存也故萃得自家精神則祖考發揚未盡之精神自在若果實亦都歸泯滅子孫之誠敬盡昧則餘氣之發揚者亦終泯矣不如此看而只據發揚之未盡者為來格之鬼神則亦有不發揚者又謂之何論語端章甫蒙引云君相皆然考陳氏禮書及文獻通考諸侯玄冕以祭則宗廟非君臣同服也會同之服雖無明文然考諸侯相朝聘用皮辨則會同亦非君臣同服也諸侯宗廟君卿大夫皆冕服命士有雀辨服辨有覆無旒衣亦玄衣纁裳不命之士則止玄端服或素裳或玄裳或黃裳或雜裳視朔及朝聘君卿大夫皆皮辨服士不得皮辨服止玄端服士冠禮再加用皮辨服士昏禮攝盛亦皮辨服然皮辨大夫服也士不得服皮辨服虛齋稼書皆欠深考朱子答曽擇之曰百日卒哭乃開元禮以今人葬或不能如期故為此權制殊失禮意若過期未葬自不當卒哭愚按朱子非泥古者其為此言警人也至矣先王之禮既亡士處斯世不得不稍稍從俗然須問大節上過意得去否潘子善問云康王釋喪服而被麻冕受虎賁之迎於南門之外且受黃朱圭幣之獻諸家皆以為禮之變獨蘇氏以為失禮使周公在必不為此未知當此際合如何區處朱子答曰天子諸侯之禮與士庶人不同故孟子有吾未之學之語蓋謂此類耳如伊訓元祀十二月朔亦是新喪伊尹己奉嗣王祇見厥祖固不可用凶服矣漢唐新主即位皆行册禮君臣亦皆吉服追述先帝之命以告嗣君韓文集順宗實録中有此事可考蓋易世傳授國之大事當嚴其禮而王侯以國為家雖先君之喪猶以為己私服也五代以來此禮不講則始終之際殊草草矣愚按此條朱子不取蘇氏之説與蔡氏書傳不同康王麻冕受册命此一時之權朱子答嚴時亨曰喪禮自葬以前皆謂之奠其禮甚簡蓋哀不能文而於新死者亦不忍遽以鬼神之禮事之也自虞以後方謂之祭故禮家謂奠為喪祭而虞為吉祭蓋漸趨于吉也酹酒有兩説一用鬱鬯灌地以降神則唯天子諸侯之禮有之今其書亡不可深考一是祭酒蓋古者飲食必祭今以鬼神自不能祭故代之祭也今人雖存其禮而失其義不可不知愚按知奠與祭之分則知今人之奠煩其文者非矣酹酒之禮今人或行于祭畢之後既非灌地又非代祭其失禮尤明祭畢而後酹酒於地大非禮意又李晦叔問程氏祭義謂凡配止以正妻一人或奉祠之人是再娶所生即以所生母配竊謂凡配止用正妻一人是也若奉祀者是再娶之子乃許用所生配而正妻無子遂不得配享可乎朱子答曰程先生此説恐誤唐會要中有論凡是嫡母無先後皆當並祔合祭與古諸侯之禮不同晦叔又問曰夫主不可以二者也四明髙氏之説云耳此謂有宗子之家主祭故庶子止以其牲祭于宗子之家可也今人若兄弟異居相去遼逺欲各祭其父祖亦謂不可以二主乎朱子答曰兄弟異居廟初不異只合兄祭而弟與執事或以物助之為宜向見説前輩有如此而相去逺者則兄設主弟不立主只于祭時旋設位以紙榜標記逐位祭畢焚之如此似亦得禮之變也又曰魏公贈諡只告於廟疑為得禮但今世皆告墓恐未免隨俗耳愚按此三條皆斟酌古今之宜古者天子諸侯不再娶后夫人死則后夫人之次娣主內政謂之繼室以天子後宫百餘人諸侯亦一娶九女是以不必再娶后夫人無子則后夫人之娣之子為后夫人之後又無則次娣之子又無則庶子或以長或擇賢凡繼父後者即為嫡母後故一廟只一配而生母只可祭於别宫春秋時此禮已亂矣然其義百世不可易也大夫士則有再娶如己有子則亦不宜再娶又或庶子不堪承後如孔子之兄孟皮或內政不可無主如宗子雖七十無無主婦則又不得不再娶如前嫡已有子則繼娶之嫡只是支子一主仍只當一嫡繼嫡則其子祀之私室不當並祔合祭然前嫡之子既嘗事之為繼母則其情自不得恝然或為之祭之亦可也若前嫡無子而繼娶之嫡有子以承父後則必不可廢其生母以奉前母又不可竟棄前嫡而惟私已母此則並祔合祭如唐會要所云於人情為順於禮亦不背不得拘一主只一配之制也大要宗子之法是禮義之大綱宗子之法不講如有網無綱禮制亦無從下手天下國家只是一理不得謂立嫡立後只是國家之法而士庶可無問也李晦叔又問子事父母劉元承所編二先生語録謂婦當拜于堂下子不當拜于堂下蓋父子主恩婦乃義合朱子答曰子婦一例恐不當有分别愚按朱子於程子之説不敢漫從如此凡子婦行禮皆當並拜堂下敬乃所以行其愛謂子不當拜堂下是怙愛也然昏禮新婦初見舅姑卻只當是婦拜行禮如禮婦盥饋享婦皆新婦之事子固不必與也李晦叔又問為長子三年及為伯叔兄弟皆期服而不解官為士者許赴舉不知當官與赴舉時還吉服耶若須吉服則又與五服所載年月相戾矣朱子答曰此等事只得遵朝廷法令若心自不安不欲赴舉則勿行可也當官則無法可解罷但雖不得不暫釋衰亦未可遽純吉也愚按凡束於功令而心自不安者必存其不得已之意方可父為為後長子必當斬衰三年又答郭子從曰古者一世自為一廟自後漢以來乃為同堂異室之廟一世一室而以西為上如韓文中家廟碑有祭初室祭東室之語今國家亦只用此制故士大夫家亦無一世一廟之法而一世一室之制亦不能備故溫公諸家祭禮皆用以右為尊之説獨文潞公嘗立家廟今溫公集中有碑載其制度頗詳亦是一世一室而以右為上自可撿看伊川之説亦誤大抵今士大夫家只當且以溫公之法為定也愚按以西為上之制前賢盡從之後人何必復為紛紛之論耶神主皆宜上右考右妣左合葬亦然答余正甫論魏元成加服曰觀當時所加曽祖之服仍為齊衰而加至五月非降為小功也今五服格仍遵用之雖于古為有加然恐亦未為不可也嫂叔之服先儒固謂雖制服亦可然則徵議未為大失但以理論外祖父母止服小功則姨與舅自合同為緦麻徵反加舅之服以同于姨則為失耳抑此增損服制若果非是亦自只合坐以輕變禮經之罪恐與失節事讎自不相須也蓋人之姿稟見識不同或明于此而暗于彼或得于彼而失于此當取節焉不可株連蔓引而纍罪併贓也愚按如此論事最公若愚謂象山不知祔與遷為兩事由于學術之差則又不可以此例古者嫂叔無服然古人五服之衰各有制度斬衰之麻三升齊衰降服四升正服五升義服六升大功降服七升正服八升義服九升小功降服十升正服十一升義服十二升緦麻如朝服之布而去其半有事其縷無事其布故無服者無斬齊功緦之服耳五等之外自有弔服加麻弔服者緦衰疑衰錫衰皆是疑衰為弔服之正加麻無加絰無服者弔服加麻如弟子為師心喪三年若喪父而無服孔子之喪二三子皆絰而出是也禮平居則絰出則否絰而出者加隆然也為師若喪父而無服則為嫂若喪兄而無服矣若喪兄而無服則弔服加麻矣今人五服之衰無制則名曰期功且實皆無服豈若古人之無服而實已有服乎自唐制而嫂叔小功然諸父兄弟世母叔母皆期而叔嫂只小功雖曰加之以有服實降之以輕服也今亡弔服加麻之制矣然凡於情之宜有服而服降於無服者如為後之子不得為出母嫁母服之類皆當內致其情外從其制情謂哀痛之情制謂無服之制素服以終其期而從事如故如應外事不敢廢可也若以為無服而歡會宴樂華服美飾快然無情於死者則惡乎可參讀禮志疑卷上
